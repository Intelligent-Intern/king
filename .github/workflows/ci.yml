name: King Canonical Baseline

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "extension/**"
      - "stubs/**"
      - "quiche/**"
      - "Makefile"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "extension/**"
      - "stubs/**"
      - "quiche/**"
      - "Makefile"
  workflow_dispatch:

concurrency:
  group: king-canonical-baseline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  canonical-baseline:
    name: Audit, Build, Test, Go-Live
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore external quiche checkout
        run: |
          if [[ -d quiche/.git ]]; then
            git -C quiche submodule update --init --recursive quiche/deps/boringssl
          else
            git clone --recursive https://github.com/cloudflare/quiche.git quiche
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('quiche/quiche/Cargo.lock', 'quiche/apps/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Verify toolchain
        run: |
          php -v
          phpize -v
          cargo --version

      - name: Lint public PHP stub surface
        run: php -l stubs/king.php

      - name: Run repo-local static checks
        working-directory: extension
        run: ./scripts/static-checks.sh

      - name: Audit active runtime surface
        working-directory: extension
        run: ./scripts/audit-runtime-surface.sh

      - name: Build canonical release profile
        working-directory: extension
        run: ./scripts/build-profile.sh release

      - name: Run canonical PHPT suite
        working-directory: extension
        run: ./scripts/test-extension.sh

      - name: Run final go-live readiness checks
        working-directory: extension
        run: ./scripts/go-live-readiness.sh --skip-baseline --output-dir ../dist --benchmark-iterations 5000 --benchmark-warmup 500 --benchmark-budget-file benchmarks/budgets/canonical-ci.json

      - name: Upload release package artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: king-release-package
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-canonical-baseline-failures
          if-no-files-found: ignore
          path: |
            extension/config.log
            extension/tests/*.diff
            extension/tests/*.exp
            extension/tests/*.log
            extension/tests/*.out

  profile-smoke:
    name: ${{ matrix.profile }} profile smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        profile:
          - debug
          - asan
          - ubsan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore external quiche checkout
        run: |
          if [[ -d quiche/.git ]]; then
            git -C quiche submodule update --init --recursive quiche/deps/boringssl
          else
            git clone --recursive https://github.com/cloudflare/quiche.git quiche
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('quiche/quiche/Cargo.lock', 'quiche/apps/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Build profile
        working-directory: extension
        run: ./scripts/build-profile.sh "${{ matrix.profile }}"

      - name: Smoke profile artifact
        working-directory: extension
        run: ./scripts/smoke-profile.sh "${{ matrix.profile }}"

      - name: Upload profile failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-${{ matrix.profile }}-profile-failures
          if-no-files-found: ignore
          path: |
            extension/config.log
            extension/build/profiles/${{ matrix.profile }}/
            extension/tests/*.diff
            extension/tests/*.exp
            extension/tests/*.log
            extension/tests/*.out
