name: King Library CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  DEBIAN_FRONTEND: noninteractive
  COMPOSER_ALLOW_SUPERUSER: 1

jobs:
  # Multi-PHP Version Testing
  test-php-versions:
    name: Test PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4']
        include:
          - php-version: '8.1'
            experimental: false
          - php-version: '8.2'
            experimental: false
          - php-version: '8.3'
            experimental: false
          - php-version: '8.4'
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, mbstring, openssl, curl, zip, sockets, pcntl, posix
          tools: composer
          coverage: xdebug

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libnghttp2-dev \
            libev-dev \
            libevent-dev \
            libjansson-dev \
            libjemalloc-dev \
            zlib1g-dev \
            pkg-config \
            ccache \
            rustc \
            cargo

      - name: Setup ccache
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ matrix.php-version }}-
            composer-

      - name: Install Composer dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --optimize-autoloader
          fi

      - name: Build King extension
        run: |
          cd extension
          phpize
          ./configure --enable-king --with-openssl --with-curl
          make -j$(nproc)
          make install
          echo "extension=king.so" >> $(php --ini | grep "Loaded Configuration" | sed -e "s|.*:\s*||")

      - name: Verify extension loading
        run: |
          php -m | grep king
          php -r "echo 'King extension version: ' . phpversion('king') . PHP_EOL;"

      - name: Run PHPUnit tests
        run: |
          if [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit --configuration phpunit.xml --coverage-clover coverage.xml
          else
            echo "PHPUnit not found, skipping tests"
          fi

      - name: Run integration tests
        run: |
          if [ -f tests/integration/system_integration_test.php ]; then
            php tests/integration/system_integration_test.php
          else
            echo "Integration tests not found, skipping"
          fi

      - name: Upload coverage to Codecov
        if: matrix.php-version == '8.3'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Demo Application Testing
  demo-testing:
    name: Demo Application Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: demo/video-chat/package-lock.json

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, mbstring, openssl, curl, zip, sockets

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            pkg-config \
            rustc \
            cargo

      - name: Build King extension
        run: |
          cd extension
          phpize
          ./configure --enable-king
          make -j$(nproc)
          make install
          echo "extension=king.so" >> $(php --ini | grep "Loaded Configuration" | sed -e "s|.*:\s*||")

      - name: Install demo dependencies
        run: |
          cd demo/video-chat
          npm ci

      - name: Build demo application
        run: |
          cd demo/video-chat
          npm run build

      - name: Run demo tests
        run: |
          cd demo/video-chat
          if [ -f package.json ] && grep -q "test:unit" package.json; then
            npm run test:unit
          else
            echo "Unit tests not configured, skipping"
          fi

      - name: Start demo server
        run: |
          cd demo/video-chat
          if [ -f package.json ] && grep -q "preview" package.json; then
            npm run preview &
            sleep 5
          else
            echo "Preview not configured, skipping"
          fi

      - name: Upload demo artifacts
        uses: actions/upload-artifact@v3
        with:
          name: demo-build
          path: demo/video-chat/dist/

  # Build System Testing
  build-system:
    name: Build System Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test Makefile
        run: |
          if [ -f Makefile ]; then
            make help || echo "No help target"
            make clean || echo "No clean target"
          else
            echo "No Makefile found"
          fi

      - name: Test build scripts
        run: |
          if [ -d bin ]; then
            for script in bin/*.sh; do
              if [ -f "$script" ]; then
                echo "Testing $script"
                bash -n "$script" || echo "Syntax error in $script"
              fi
            done
          else
            echo "No bin directory found"
          fi

  # Notification
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test-php-versions, demo-testing, build-system]
    if: always()
    steps:
      - name: Notify success
        if: ${{ needs.test-php-versions.result == 'success' && needs.demo-testing.result == 'success' }}
        run: |
          echo "✅ King Library CI/CD Pipeline completed successfully!"
          echo "📊 All tests passed across PHP 8.1-8.4"
          echo "🚀 Demo application tested"
          echo "🔧 Build system verified"

      - name: Notify failure
        if: ${{ needs.test-php-versions.result == 'failure' || needs.demo-testing.result == 'failure' }}
        run: |
          echo "❌ King Library CI/CD Pipeline failed!"
          echo "Please check the logs for details."
          exit 1