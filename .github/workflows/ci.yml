      - name: Verify pinned Rust toolchain
        run: bash ./infra/scripts/toolchain-lock.sh --verify-rust

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('infra/scripts/quiche-bootstrap.lock', 'infra/scripts/bootstrap-quiche.sh', 'infra/scripts/build-profile.sh') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Resolve previous compatibility ref
        id: previous
        run: |
          previous_ref=""
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            previous_ref="${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            previous_ref="${{ github.event.before }}"
          fi

          if [[ -z "${previous_ref}" || "${previous_ref}" =~ ^0+$ ]]; then
            previous_ref="$(git rev-parse HEAD^)"
          fi

          echo "ref=${previous_ref}" >> "${GITHUB_OUTPUT}"

      - name: Run release upgrade compatibility gate
        working-directory: extension
        run: ../infra/scripts/check-release-upgrade.sh --from-ref "${{ steps.previous.outputs.ref }}" --artifacts-dir ../compat-artifacts/release-upgrade

      - name: Collect release upgrade PHPT diagnostics
        if: failure()
        working-directory: extension
        run: |
          ../infra/scripts/collect-phpt-failure-artifacts.sh \
            --job-name "release-upgrade-compatibility" \
            --tests-dir tests \
            --config-log config.log \
            --output-dir ../compat-artifacts/phpt/release-upgrade

      - name: Upload release upgrade failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-release-upgrade-failures
          if-no-files-found: ignore
          path: |
            compat-artifacts/release-upgrade/
            compat-artifacts/phpt/release-upgrade/

