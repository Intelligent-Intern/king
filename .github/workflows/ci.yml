  release-config-state-compatibility:
    name: Release Config-State Compatibility
    needs: canonical-baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('infra/scripts/quiche-bootstrap.lock', 'infra/scripts/bootstrap-quiche.sh', 'infra/scripts/build-profile.sh') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Run release config-state compatibility matrix
        working-directory: extension
        run: ../infra/scripts/check-config-compatibility-matrix.sh --artifacts-dir ../compat-artifacts/release-config-state

      - name: Upload release config-state failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-release-config-state-failures
          if-no-files-found: ignore
          path: |
            compat-artifacts/release-config-state/
            extension/config.log
            extension/tests/*.diff
            extension/tests/*.exp
            extension/tests/*.log
            extension/tests/*.out

  sanitizer-soak:
    name: ${{ matrix.mode }} sanitizer soak
    needs: canonical-baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: asan
            profile: asan
            iterations: 5
          - mode: ubsan
            profile: ubsan
            iterations: 5
          - mode: leak
            profile: asan
            iterations: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('infra/scripts/quiche-bootstrap.lock', 'infra/scripts/bootstrap-quiche.sh', 'infra/scripts/build-profile.sh') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Build sanitizer profile
        working-directory: extension
        run: ../infra/scripts/build-profile.sh "${{ matrix.profile }}"

      - name: Run sanitizer soak
        working-directory: extension
        run: ../infra/scripts/soak-runtime.sh "${{ matrix.mode }}" --iterations "${{ matrix.iterations }}" --artifacts-dir ../soak-artifacts/${{ matrix.mode }}

      - name: Upload sanitizer soak failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-${{ matrix.mode }}-soak-diagnostics
          if-no-files-found: ignore
          path: |
            soak-artifacts/${{ matrix.mode }}/
            extension/config.log
            extension/tests/*.diff
            extension/tests/*.exp
            extension/tests/*.log
            extension/tests/*.out

  release-full-gate:
    name: Full pipeline completed
    needs:
      - canonical-baseline
      - profile-smoke
      - install-package-matrix
      - release-upgrade-compatibility
      - release-downgrade-compatibility
      - release-persistence-migration
      - release-config-state-compatibility
      - sanitizer-soak
      - branch-push-dedupe
    if: needs.branch-push-dedupe.outputs.release-mode == 'full-release'
    runs-on: ubuntu-24.04
    steps:
      - name: Full release pipeline passed
        run: echo "Full pipeline passed and release packages are ready."

  publish-release:
    name: Publish release from branch artifacts
    needs:
      - branch-push-dedupe
      - install-package-matrix
      - release-package-matrix-fast
      - release-full-gate
    if: |
      github.event_name == 'push' && (
        needs.branch-push-dedupe.outputs.release-mode == 'fast-release' ||
        needs.branch-push-dedupe.outputs.release-mode == 'full-release'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve release metadata
        id: release
        run: |
          set -euo pipefail

          RELEASE_BRANCH="${GITHUB_REF_NAME}"
          RELEASE_VERSION="${RELEASE_BRANCH#release/}"

          if [[ "${RELEASE_BRANCH}" == release/* ]]; then
            RELEASE_VERSION="${RELEASE_BRANCH#release/}"
          elif [[ "${RELEASE_BRANCH}" == hotfix-release/* ]]; then
            RELEASE_VERSION="${RELEASE_BRANCH#hotfix-release/}"
          else
            echo "::error::Unsupported release branch format for publish: ${RELEASE_BRANCH}" >&2
            exit 1
          fi

          if [[ "${RELEASE_VERSION}" == v* ]]; then
            RELEASE_TAG="${RELEASE_VERSION}"
          else
            RELEASE_TAG="v${RELEASE_VERSION}"
          fi

          echo "release-branch=${RELEASE_BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "release-version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release-tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build PIE source package
        run: ./infra/scripts/package-pie-source.sh --output-dir release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.1-linux-amd64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.1-linux-arm64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.2-linux-amd64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.2-linux-arm64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.3-linux-amd64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.3-linux-arm64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.4-linux-amd64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.4-linux-arm64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.5-linux-amd64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.5-linux-arm64
          path: release-assets

      - name: Verify release assets
        run: |
          set -euo pipefail

          RELEASE_BRANCH="${{ steps.release.outputs.release-branch }}"
          RELEASE_VERSION="${{ steps.release.outputs.release-version }}"
          RELEASE_TAG="${{ steps.release.outputs.release-tag }}"

          if [[ ! -d release-assets ]]; then
            echo "Missing release-assets staging directory." >&2
            exit 1
          fi

          if [[ -z "${RELEASE_VERSION}" ]]; then
            echo "Release branch must be in the form release/<version> or hotfix-release/<version>: ${RELEASE_BRANCH}" >&2
            exit 1
          fi

          echo "Release branch ${RELEASE_BRANCH} -> release tag ${RELEASE_TAG}"

          if ! compgen -G "release-assets/*.tgz" > /dev/null; then
            echo "No PIE source asset found in release-assets." >&2
            exit 1
          fi
          if ! compgen -G "release-assets/*.tar.gz" > /dev/null; then
            echo "No release package archive found in release-assets." >&2
            exit 1
          fi

          ls -lah release-assets

      - name: Publish to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ steps.release.outputs.release-tag }}"
          RELEASE_TARGET="${GITHUB_SHA}"

          prerelease_args=()
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload \
              "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber \
              release-assets/*
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "King ${RELEASE_TAG}" \
              --target "${RELEASE_TARGET}" \
              --notes-from-tag \
              "${prerelease_args[@]}" \
              release-assets/*
          fi
