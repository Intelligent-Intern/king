name: King Canonical Baseline

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "extension/**"
      - "stubs/**"
      - "quiche/**"
      - "Makefile"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "extension/**"
      - "stubs/**"
      - "quiche/**"
      - "Makefile"
  workflow_dispatch:

concurrency:
  group: king-canonical-baseline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  canonical-baseline:
    name: Audit, Build, Test
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('quiche/quiche/Cargo.lock', 'quiche/apps/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            cmake \
            libssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Verify toolchain
        run: |
          php -v
          phpize -v
          cargo --version

      - name: Lint public PHP stub surface
        run: php -l stubs/king.php

      - name: Audit active skeleton surface
        working-directory: extension
        run: ./scripts/audit-skeleton-surface.sh

      - name: Build canonical skeleton
        working-directory: extension
        run: ./scripts/build-skeleton.sh

      - name: Run canonical PHPT suite
        working-directory: extension
        run: ./scripts/test-skeleton.sh

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-canonical-baseline-failures
          if-no-files-found: ignore
          path: |
            extension/config.log
            extension/tests/*.diff
            extension/tests/*.exp
            extension/tests/*.log
            extension/tests/*.out
