  sanitizer-soak:
    name: ${{ matrix.mode }} sanitizer soak
    needs: canonical-baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: asan
            profile: asan
            iterations: 5
          - mode: ubsan
            profile: ubsan
            iterations: 5
          - mode: leak
            profile: asan
            iterations: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP 8.5
