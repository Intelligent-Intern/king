name: King Canonical Baseline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: king-canonical-baseline-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  DEBIAN_FRONTEND: noninteractive
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  branch-push-dedupe:
    name: Branch push dedupe
    runs-on: ubuntu-24.04
    outputs:
      run-heavy-jobs: ${{ steps.decide.outputs.run-heavy-jobs }}
      release-mode: ${{ steps.decide.outputs.release-mode }}
      reason: ${{ steps.decide.outputs.reason }}

    steps:
      - name: Decide whether this ref should run the full pipeline
        id: decide
        uses: actions/github-script@v8
        with:
          script: |
            const eventName = context.eventName;
            const refName = process.env.GITHUB_REF_NAME || '';
            const refType = process.env.GITHUB_REF_TYPE || '';
            const planningBranch = (eventName === 'pull_request'
              ? context.payload.pull_request?.head?.ref
              : refName
            ) || '';
            let runHeavyJobs = 'true';
            let releaseMode = 'full';
            let reason = `${eventName} on ${refName || planningBranch}: run canonical pipeline`;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isPlanningBranch = planningBranch.startsWith('planning/');
            const isReleaseBranch = planningBranch.startsWith('release/');
            const isHotfixReleaseBranch = planningBranch.startsWith('hotfix-release/');
            const isMainMerge = eventName === 'push' && refType === 'branch' && refName === 'main';

            const sameAsMain = async () => {
              if (!isReleaseBranch) {
                return false;
              }

              try {
                const compare = await github.rest.repos.compareCommits({
                  owner,
                  repo,
                  base: 'main',
                  head: planningBranch,
                });

                return compare.data.ahead_by === 0 && compare.data.behind_by === 0;
              } catch (error) {
                core.notice(`Could not compare ${planningBranch} against main: ${error.message}`);
                return false;
              }
            };

            const prHeadEqualsBase = async () => {
              if (!isReleaseBranch || eventName !== 'pull_request') {
                return false;
              }

              try {
                const baseRef = context.payload.pull_request?.base?.sha;
                const headRef = context.payload.pull_request?.head?.sha;
                if (!baseRef || !headRef) {
                  return false;
                }

                const compare = await github.rest.repos.compareCommits({
                  owner,
                  repo,
                  base: baseRef,
                  head: headRef,
                });

                return compare.data.ahead_by === 0 && compare.data.behind_by === 0;
              } catch (error) {
                core.notice(`Could not compare pull request ${context.payload.pull_request?.number || '<unknown>'}: ${error.message}`);
                return false;
              }
            };

            if (isPlanningBranch) {
              runHeavyJobs = 'false';
              releaseMode = 'skip';
              reason = `Skipping canonical baseline for planning branch ${planningBranch}; docs-only guard is required.`;
            } else if (isHotfixReleaseBranch) {
              runHeavyJobs = 'false';
              releaseMode = 'skip';
              reason = `Skipping canonical baseline for hotfix-release branch ${planningBranch}; build/release deferred to merge workflow.`;
            } else if (isReleaseBranch && eventName === 'push' && refType === 'branch') {
              if (await sameAsMain()) {
                runHeavyJobs = 'false';
                releaseMode = 'fast-release';
                reason = `Release branch ${planningBranch} equals main; executing fast release path.`;
              } else {
                runHeavyJobs = 'true';
                releaseMode = 'full-release';
                reason = `Release branch ${planningBranch} diverges from main; executing full pipeline before release.`;
              }
            } else if (isReleaseBranch && eventName === 'pull_request') {
              if (await prHeadEqualsBase()) {
                runHeavyJobs = 'false';
                releaseMode = 'skip';
                reason = `Release PR ${planningBranch} is already aligned with target; skipping PR build.`;
              } else {
                runHeavyJobs = 'true';
                releaseMode = 'full-release';
                reason = `Release PR ${planningBranch} diverges from target; executing full pipeline before merge.`;
              }
            } else if (isMainMerge) {
              const mergeMessage = (context.payload.head_commit?.message || '').split('\n')[0] || '';
              const isReleaseMerge = /^Merge pull request #\d+ from .*\/(release|hotfix-release)\//.test(mergeMessage);

              if (isReleaseMerge) {
                runHeavyJobs = 'false';
                releaseMode = 'skip';
                reason = `Skipping canonical baseline for ${planningBranch} merge; release publish handled by merge workflow.`;
              }
            } else {
              if (eventName === 'pull_request' || eventName === 'push') {
                runHeavyJobs = 'true';
                releaseMode = 'full';
              }
              reason = `${eventName} on ${planningBranch}: full pipeline.`;
            }

            core.setOutput('run-heavy-jobs', runHeavyJobs);
            core.setOutput('release-mode', releaseMode);
            core.setOutput('reason', reason);
            core.notice(reason);

  canonical-baseline:
    name: Audit, Build, Test, Go-Live
    needs: branch-push-dedupe
    if: needs.branch-push-dedupe.outputs.run-heavy-jobs == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('infra/scripts/quiche-bootstrap.lock', 'infra/scripts/bootstrap-quiche.sh', 'infra/scripts/build-profile.sh') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Verify toolchain
        run: |
          php -v
          phpize -v
          cargo --version

      - name: Lint public PHP stub surface
        run: php -l stubs/king.php

      - name: Run repo-local static checks
        working-directory: extension
        run: ../infra/scripts/static-checks.sh

      - name: Audit active runtime surface
        working-directory: extension
        run: ../infra/scripts/audit-runtime-surface.sh

      - name: Build canonical release profile
        working-directory: extension
        run: ../infra/scripts/build-profile.sh release

      - name: Run canonical PHPT suite
        working-directory: extension
        run: ../infra/scripts/test-extension.sh

      - name: Run final go-live readiness checks
        working-directory: extension
        run: ../infra/scripts/go-live-readiness.sh --skip-baseline --output-dir ../dist --benchmark-iterations 5000 --benchmark-warmup 500 --benchmark-samples 3 --benchmark-budget-file benchmarks/budgets/canonical-ci.json

      - name: Upload canonical release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: king-release-package-php8.5-linux-amd64
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-canonical-baseline-failures
          if-no-files-found: ignore
          path: |
            extension/config.log
            extension/tests/*.diff
            extension/tests/*.exp
            extension/tests/*.log
            extension/tests/*.out

  profile-smoke:
    name: ${{ matrix.profile }} profile smoke
    needs: branch-push-dedupe
    if: needs.branch-push-dedupe.outputs.run-heavy-jobs == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        profile:
          - debug
          - asan
          - ubsan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('infra/scripts/quiche-bootstrap.lock', 'infra/scripts/bootstrap-quiche.sh', 'infra/scripts/build-profile.sh') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Build profile
        working-directory: extension
        run: ../infra/scripts/build-profile.sh "${{ matrix.profile }}"

      - name: Smoke profile artifact
        working-directory: extension
        run: ../infra/scripts/smoke-profile.sh "${{ matrix.profile }}"

      - name: Upload profile failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-${{ matrix.profile }}-profile-failures
          if-no-files-found: ignore
          path: |
            extension/config.log
            extension/build/profiles/${{ matrix.profile }}/
            extension/tests/*.diff
            extension/tests/*.exp
            extension/tests/*.log
            extension/tests/*.out

  install-package-matrix:
    name: Release Package Build & Install Smoke PHP ${{ matrix.php-version }} ${{ matrix.arch-label }}
    needs: canonical-baseline
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: "8.1"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.1"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.2"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.2"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.3"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.3"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.4"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.4"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.5"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php-version }}"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.arch-label }}-cargo-${{ hashFiles('infra/scripts/quiche-bootstrap.lock', 'infra/scripts/bootstrap-quiche.sh', 'infra/scripts/build-profile.sh') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Build canonical release profile
        working-directory: extension
        run: ../infra/scripts/build-profile.sh release

      - name: Package canonical release archive
        id: package
        working-directory: extension
        run: |
          output="$(../infra/scripts/package-release.sh --output-dir ../dist)"
          printf '%s\n' "${output}"
          archive_path="$(printf '%s\n' "${output}" | sed -n 's/^Package created: //p' | tail -n 1)"
          if [[ -z "${archive_path}" ]]; then
            echo "Failed to resolve packaged archive path." >&2
            exit 1
          fi
          echo "archive_path=${archive_path}" >> "${GITHUB_OUTPUT}"

      - name: Verify packaged clean-host install path
        working-directory: extension
        run: ../infra/scripts/install-package-matrix.sh --archive "${{ steps.package.outputs.archive_path }}" --php-bins php

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-${{ matrix.arch-label }}
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

      - name: Upload package install failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-package-install-${{ matrix.php-version }}-${{ matrix.arch-label }}-failures
          if-no-files-found: ignore
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            extension/config.log

  release-package-matrix-fast:
    name: Fast release package build PHP ${{ matrix.php-version }} ${{ matrix.arch-label }}
    needs: branch-push-dedupe
    if: needs.branch-push-dedupe.outputs.release-mode == 'fast-release' && github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: "8.1"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.1"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.2"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.2"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.3"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.3"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.4"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.4"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.5"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.5"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php-version }}"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.arch-label }}-cargo-${{ hashFiles('infra/scripts/quiche-bootstrap.lock', 'infra/scripts/bootstrap-quiche.sh', 'infra/scripts/build-profile.sh') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Build canonical release profile
        working-directory: extension
        run: ../infra/scripts/build-profile.sh release

      - name: Package canonical release archive
        id: package
        working-directory: extension
        run: |
          output="$(../infra/scripts/package-release.sh --output-dir ../dist)"
          printf '%s\n' "${output}"
          archive_path="$(printf '%s\n' "${output}" | sed -n 's/^Package created: //p' | tail -n 1)"
          if [[ -z "${archive_path}" ]]; then
            echo "Failed to resolve packaged archive path." >&2
            exit 1
          fi
          echo "archive_path=${archive_path}" >> "${GITHUB_OUTPUT}"

      - name: Verify packaged clean-host install path
        working-directory: extension
        run: ../infra/scripts/install-package-matrix.sh --archive "${{ steps.package.outputs.archive_path }}" --php-bins php

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-${{ matrix.arch-label }}
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

      - name: Upload package install failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-package-install-${{ matrix.php-version }}-${{ matrix.arch-label }}-failures
          if-no-files-found: ignore
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            extension/config.log

  release-upgrade-compatibility:
    name: Release Upgrade Compatibility
    needs: canonical-baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('infra/scripts/quiche-bootstrap.lock', 'infra/scripts/bootstrap-quiche.sh', 'infra/scripts/build-profile.sh') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Resolve previous compatibility ref
        id: previous
        run: |
          previous_ref=""
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            previous_ref="${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            previous_ref="${{ github.event.before }}"
          fi

          if [[ -z "${previous_ref}" || "${previous_ref}" =~ ^0+$ ]]; then
            previous_ref="$(git rev-parse HEAD^)"
          fi

          echo "ref=${previous_ref}" >> "${GITHUB_OUTPUT}"

      - name: Run release upgrade compatibility gate
        working-directory: extension
        run: ../infra/scripts/check-release-upgrade.sh --from-ref "${{ steps.previous.outputs.ref }}" --artifacts-dir ../compat-artifacts/release-upgrade

      - name: Upload release upgrade failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-release-upgrade-failures
          if-no-files-found: ignore
          path: |
            compat-artifacts/release-upgrade/
            extension/config.log
            extension/tests/*.diff
            extension/tests/*.exp
            extension/tests/*.log
            extension/tests/*.out

