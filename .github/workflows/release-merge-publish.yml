name: King Release Publish on Merge

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: read
  packages: write

concurrency:
  group: king-release-publish-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  resolve-release-merge:
    name: Resolve release merge requirements
    runs-on: ubuntu-24.04
    outputs:
      should-publish: ${{ steps.resolve.outputs.should-publish }}
      release-branch: ${{ steps.resolve.outputs.release-branch }}
      release-tag: ${{ steps.resolve.outputs.release-tag }}
      release-version: ${{ steps.resolve.outputs.release-version }}
      is-merge-to-main: ${{ steps.resolve.outputs.is-merge-to-main }}
      release-commit: ${{ steps.resolve.outputs.release-commit }}
    steps:
      - name: Resolve release target
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RELEASE_BRANCH="${{ github.event.pull_request.head.ref }}"
          MERGE_TO_MAIN="${{ github.event.pull_request.merged }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          SHOULD_PUBLISH="false"
          IS_MERGE_TO_MAIN="false"

          if [[ "${MERGE_TO_MAIN}" != "true" || "${BASE_REF}" != "main" ]]; then
              echo "::notice::Release merge publish skipped because the event is not a merged PR into main." >&2
              echo "is-merge-to-main=${IS_MERGE_TO_MAIN}" >> "${GITHUB_OUTPUT}"
              echo "should-publish=${SHOULD_PUBLISH}" >> "${GITHUB_OUTPUT}"
              echo "release-commit=" >> "${GITHUB_OUTPUT}"
              echo "release-branch=${RELEASE_BRANCH}" >> "${GITHUB_OUTPUT}"
              echo "release-version=" >> "${GITHUB_OUTPUT}"
              echo "release-tag=" >> "${GITHUB_OUTPUT}"
              exit 0
          fi

          IS_MERGE_TO_MAIN="true"

          if [[ "${RELEASE_BRANCH}" == develop/v* ]]; then
            RELEASE_VERSION="${RELEASE_BRANCH#develop/}"
          else
              echo "Release workflow ignored for branch ${RELEASE_BRANCH}." >&2
              SHOULD_PUBLISH="false"
              echo "release-commit=" >> "${GITHUB_OUTPUT}"
              echo "should-publish=${SHOULD_PUBLISH}" >> "${GITHUB_OUTPUT}"
              echo "release-branch=${RELEASE_BRANCH}" >> "${GITHUB_OUTPUT}"
              echo "release-version=" >> "${GITHUB_OUTPUT}"
              echo "release-tag=" >> "${GITHUB_OUTPUT}"
              exit 0
          fi

          if [[ -z "${RELEASE_VERSION}" ]]; then
            echo "::error::Could not resolve release version from branch ${RELEASE_BRANCH}" >&2
            exit 1
          fi

          if [[ "${RELEASE_VERSION}" == v* ]]; then
            RELEASE_TAG="${RELEASE_VERSION}"
          else
            RELEASE_TAG="v${RELEASE_VERSION}"
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            SHOULD_PUBLISH="false"
          else
            SHOULD_PUBLISH="true"
          fi

          RELEASE_COMMIT="${{ github.event.pull_request.merge_commit_sha }}"
          if [[ -z "${RELEASE_COMMIT}" ]]; then
              echo "::error::Pull request merge commit SHA is missing." >&2
              exit 1
          fi

          echo "is-merge-to-main=${IS_MERGE_TO_MAIN}" >> "${GITHUB_OUTPUT}"
          echo "should-publish=${SHOULD_PUBLISH}" >> "${GITHUB_OUTPUT}"
          echo "release-branch=${RELEASE_BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "release-version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release-tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "release-commit=${RELEASE_COMMIT}" >> "${GITHUB_OUTPUT}"

  build-release-packages:
    name: Build release artifacts for ${{ matrix.php-version }} / ${{ matrix.arch-label }}
    needs:
      - resolve-release-merge
    if: needs.resolve-release-merge.outputs.is-merge-to-main == 'true' && needs.resolve-release-merge.outputs.should-publish == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: "8.1"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.1"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.2"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.2"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.3"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.3"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.4"
            runner: ubuntu-24.04
            arch-label: linux-amd64
          - php-version: "8.4"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.5"
            runner: ubuntu-24.04-arm
            arch-label: linux-arm64
          - php-version: "8.5"
            runner: ubuntu-24.04
            arch-label: linux-amd64

    steps:
      - name: Checkout release merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release-merge.outputs.release-commit }}
          submodules: recursive

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php-version }}"
          coverage: none
          extensions: curl, mbstring, openssl, sockets

      - name: Resolve pinned toolchain versions
        id: toolchain
        run: bash ./infra/scripts/toolchain-lock.sh --github-output "${GITHUB_OUTPUT}"

      - name: Setup Rust pinned toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "${{ steps.toolchain.outputs.rust_toolchain }}"

      - name: Verify pinned Rust toolchain
        run: bash ./infra/scripts/toolchain-lock.sh --verify-rust

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.arch-label }}-cargo-${{ hashFiles('infra/scripts/quiche-bootstrap.lock', 'infra/scripts/bootstrap-quiche.sh', 'infra/scripts/build-profile.sh') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            cmake \
            libssl-dev \
            libcurl4-openssl-dev \
            libtool \
            ninja-build \
            pkg-config \
            re2c

      - name: Build canonical release profile
        working-directory: extension
        run: ../infra/scripts/build-profile.sh release

      - name: Package canonical release archive
        id: package
        working-directory: extension
        run: |
          output="$(../infra/scripts/package-release.sh --verify-reproducible --output-dir ../dist)"
          printf '%s\n' "${output}"
          archive_path="$(printf '%s\n' "${output}" | sed -n 's/^Package created: //p' | tail -n 1)"
          if [[ -z "${archive_path}" ]]; then
            echo "Failed to resolve packaged archive path." >&2
            exit 1
          fi
          echo "archive_path=${archive_path}" >> "${GITHUB_OUTPUT}"

      - name: Verify release-artifact supply-chain integrity
        working-directory: extension
        run: ../infra/scripts/verify-release-supply-chain.sh --archive "${{ steps.package.outputs.archive_path }}" --expected-git-commit "${{ needs.resolve-release-merge.outputs.release-commit }}"

      - name: Verify packaged clean-host install path
        working-directory: extension
        run: ../infra/scripts/install-package-matrix.sh --archive "${{ steps.package.outputs.archive_path }}" --php-bins php

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-${{ matrix.arch-label }}
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

      - name: Upload package install failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: king-package-install-${{ matrix.php-version }}-${{ matrix.arch-label }}-failures
          if-no-files-found: ignore
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            extension/config.log

  build-release-pie-source:
    name: Build PIE source asset
    needs:
      - resolve-release-merge
    if: needs.resolve-release-merge.outputs.is-merge-to-main == 'true' && needs.resolve-release-merge.outputs.should-publish == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout release merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release-merge.outputs.release-commit }}
          submodules: recursive

      - name: Build PIE source package
        run: ./infra/scripts/package-pie-source.sh --output-dir release-assets --release-tag "${{ needs.resolve-release-merge.outputs.release-tag }}"

      - name: Upload PIE source asset
        uses: actions/upload-artifact@v4
        with:
          name: king-release-pie-source
          if-no-files-found: error
          path: release-assets/*.tgz

  publish-release:
    name: Publish release artifacts
    needs:
      - resolve-release-merge
      - build-release-packages
      - build-release-pie-source
    if: needs.resolve-release-merge.outputs.is-merge-to-main == 'true' && needs.resolve-release-merge.outputs.should-publish == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Checkout release merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release-merge.outputs.release-commit }}
          submodules: recursive

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.1-linux-amd64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.1-linux-arm64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.2-linux-amd64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.2-linux-arm64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.3-linux-amd64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.3-linux-arm64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.4-linux-amd64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.4-linux-arm64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.5-linux-amd64
          path: release-assets

      - name: Download packaged release artifacts
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.5-linux-arm64
          path: release-assets

      - name: Download PIE source artifact
        uses: actions/download-artifact@v4
        with:
          name: king-release-pie-source
          path: release-assets

      - name: Verify release assets
        run: |
          set -euo pipefail

          RELEASE_BRANCH="${{ github.event.pull_request.head.ref }}"
          RELEASE_TAG="${{ needs.resolve-release-merge.outputs.release-tag }}"
          RELEASE_VERSION="${{ needs.resolve-release-merge.outputs.release-version }}"

          if [[ -z "${RELEASE_VERSION}" ]]; then
            echo "Release branch must be in the form develop/v<version>: ${RELEASE_BRANCH}" >&2
            exit 1
          fi

          if [ ! -d release-assets ]; then
            echo "Missing release-assets staging directory." >&2
            exit 1
          fi

          printf 'Release branch %s -> release tag %s\n' "${RELEASE_BRANCH}" "${RELEASE_TAG}"

          if ! compgen -G "release-assets/*.tgz" > /dev/null; then
            echo "No PIE source asset found in release-assets." >&2
            exit 1
          fi
          if ! compgen -G "release-assets/*.tar.gz" > /dev/null; then
            echo "No release package archive found in release-assets." >&2
            exit 1
          fi
          ls -lah release-assets

      - name: Publish to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RELEASE_BRANCH="${{ github.event.pull_request.head.ref }}"
          RELEASE_TARGET="${{ needs.resolve-release-merge.outputs.release-commit }}"
          RELEASE_TAG="${{ needs.resolve-release-merge.outputs.release-tag }}"
          RELEASE_VERSION="${{ needs.resolve-release-merge.outputs.release-version }}"

          if [[ -z "${RELEASE_VERSION}" ]]; then
            echo "Release branch must be in the form develop/v<version>: ${RELEASE_BRANCH}" >&2
            exit 1
          fi

          prerelease_args=()
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload \
              "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber \
              release-assets/*
          else
            gh release create "${RELEASE_TAG}" \
              --title "King ${RELEASE_TAG}" \
              --target "${RELEASE_TARGET}" \
              --generate-notes \
              "${prerelease_args[@]}" \
              release-assets/*
          fi

  publish-iibin:
    name: Publish @intelligentintern/iibin to npm
    needs:
      - resolve-release-merge
      - publish-release
    if: needs.resolve-release-merge.outputs.is-merge-to-main == 'true' && needs.resolve-release-merge.outputs.should-publish == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout release merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release-merge.outputs.release-commit }}
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@intelligentintern"

      - name: Resolve IIBIN package publish metadata
        id: iibin-meta
        run: |
          set -euo pipefail

          release_version="${{ needs.resolve-release-merge.outputs.release-version }}"
          if [[ -z "${release_version}" ]]; then
            echo "Missing release version output from resolve-release-merge." >&2
            exit 1
          fi

          package_version="${release_version#v}"
          if [[ -z "${package_version}" ]]; then
            echo "Failed to derive package version from release version: ${release_version}" >&2
            exit 1
          fi

          npm_tag="latest"
          if [[ "${package_version}" == *-* ]]; then
            npm_tag="beta"
          fi

          echo "package-version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "npm-tag=${npm_tag}" >> "${GITHUB_OUTPUT}"

      - name: Sync package version to release
        env:
          PACKAGE_VERSION: ${{ steps.iibin-meta.outputs.package-version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = 'packages/iibin/package.json';
          const version = process.env.PACKAGE_VERSION;
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Install package dependencies
        working-directory: packages/iibin
        run: npm ci

      - name: Verify package build
        working-directory: packages/iibin
        run: npm run typecheck && npm run build

      - name: Check if package version already exists
        id: iibin-npm-check
        env:
          PACKAGE_VERSION: ${{ steps.iibin-meta.outputs.package-version }}
        run: |
          set -euo pipefail
          if npm view "@intelligentintern/iibin@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "::notice::@intelligentintern/iibin@${PACKAGE_VERSION} already exists on npm; skipping publish."
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish package to npm
        if: steps.iibin-npm-check.outputs.exists != 'true'
        working-directory: packages/iibin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ steps.iibin-meta.outputs.npm-tag }}
        run: |
          set -euo pipefail
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "NPM_TOKEN secret is required to publish @intelligentintern/iibin." >&2
            exit 1
          fi
          npm publish --access public --tag "${NPM_TAG}"

  dockerhub-runtime-release:
    name: Build and push Docker Hub runtime image
    needs:
      - resolve-release-merge
      - build-release-packages
      - publish-release
    if: needs.resolve-release-merge.outputs.is-merge-to-main == 'true' && needs.resolve-release-merge.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout release merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release-merge.outputs.release-commit }}
          submodules: recursive

      - name: Download amd64 release package (PHP 8.5)
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.5-linux-amd64
          path: dist/docker-packages/php8.5/linux-amd64

      - name: Download arm64 release package (PHP 8.5)
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php8.5-linux-arm64
          path: dist/docker-packages/php8.5/linux-arm64

      - name: Prepare Docker Hub metadata
        id: meta-dockerhub
        run: |
          set -euo pipefail
          image="intelligentintern/king"
          release_version="${{ needs.resolve-release-merge.outputs.release-version }}"
          revision="${{ needs.resolve-release-merge.outputs.release-commit }}"
          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [[ -z "${release_version}" ]]; then
            echo "Missing release version output from resolve-release-merge." >&2
            exit 1
          fi

          tags=("${image}:${release_version}")
          if [[ "${release_version}" != *-* ]]; then
            tags+=("${image}:latest")
          fi

          {
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
            printf 'labels<<EOF\n'
            printf 'org.opencontainers.image.title=king\n'
            printf 'org.opencontainers.image.description=King PHP extension runtime image\n'
            printf 'org.opencontainers.image.created=%s\n' "${created_at}"
            printf 'org.opencontainers.image.revision=%s\n' "${revision}"
            printf 'org.opencontainers.image.source=https://github.com/%s\n' "${GITHUB_REPOSITORY}"
            printf 'EOF\n'
            printf 'created_at=%s\n' "${created_at}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker Hub runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./infra/php-runtime.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=8.5
            BUILD_DATE=${{ steps.meta-dockerhub.outputs.created_at }}
            VCS_REF=${{ needs.resolve-release-merge.outputs.release-commit }}

  docker-build-and-push:
    name: Build and push King PHP ${{ matrix.php-version }}
    needs:
      - resolve-release-merge
      - build-release-packages
    if: needs.resolve-release-merge.outputs.is-merge-to-main == 'true' && needs.resolve-release-merge.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        include:
          - php-version: '8.1'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.2'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.3'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.4'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.5'
            platforms: linux/amd64,linux/arm64
            latest: true

    steps:
      - name: Checkout release merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release-merge.outputs.release-commit }}
          submodules: recursive

      - name: Download amd64 release package
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-linux-amd64
          path: dist/docker-packages/php${{ matrix.php-version }}/linux-amd64

      - name: Download arm64 release package
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-linux-arm64
          path: dist/docker-packages/php${{ matrix.php-version }}/linux-arm64

      - name: Prepare runtime image metadata
        id: meta
        run: |
          set -euo pipefail
          image_name="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${image_name}"
          revision="${{ needs.resolve-release-merge.outputs.release-commit }}"
          short_sha="$(printf '%s' "${revision}" | cut -c1-12)"

          tags=(
            "${image}:php${{ matrix.php-version }}"
            "${image}:sha-${short_sha}-php${{ matrix.php-version }}"
          )

          if [[ "${{ matrix.latest }}" == "true" && "${{ github.event.pull_request.base.ref }}" == "main" ]]; then
            tags+=("${image}:main" "${image}:latest")
          fi

          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
            printf 'labels<<EOF\n'
            printf 'org.opencontainers.image.title=king\n'
            printf 'org.opencontainers.image.description=King PHP extension runtime image\n'
            printf 'org.opencontainers.image.created=%s\n' "${created_at}"
            printf 'org.opencontainers.image.revision=%s\n' "${revision}"
            printf 'org.opencontainers.image.source=https://github.com/%s\n' "${GITHUB_REPOSITORY}"
            printf 'EOF\n'
            printf 'created_at=%s\n' "${created_at}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push King PHP ${{ matrix.php-version }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./infra/php-runtime.Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            BUILD_DATE=${{ steps.meta.outputs.created_at }}
            VCS_REF=${{ needs.resolve-release-merge.outputs.release-commit }}

  docker-build-demo:
    name: Build and push demo application PHP ${{ matrix.php-version }}
    needs:
      - resolve-release-merge
      - build-release-packages
    if: needs.resolve-release-merge.outputs.is-merge-to-main == 'true' && needs.resolve-release-merge.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        include:
          - php-version: '8.1'
            latest: false
          - php-version: '8.2'
            latest: false
          - php-version: '8.3'
            latest: false
          - php-version: '8.4'
            latest: false
          - php-version: '8.5'
            latest: true

    steps:
      - name: Checkout release merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release-merge.outputs.release-commit }}
          submodules: recursive

      - name: Download amd64 release package
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-linux-amd64
          path: dist/docker-packages/php${{ matrix.php-version }}/linux-amd64

      - name: Download arm64 release package
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-linux-arm64
          path: dist/docker-packages/php${{ matrix.php-version }}/linux-arm64

      - name: Prepare demo image metadata
        id: meta-demo
        run: |
          set -euo pipefail
          image_name="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${image_name}-demo"
          revision="${{ needs.resolve-release-merge.outputs.release-commit }}"
          short_sha="$(printf '%s' "${revision}" | cut -c1-12)"

          tags=(
            "${image}:php${{ matrix.php-version }}"
            "${image}:sha-${short_sha}-php${{ matrix.php-version }}"
          )

          if [[ "${{ matrix.latest }}" == "true" && "${{ github.event.pull_request.base.ref }}" == "main" ]]; then
            tags+=("${image}:main" "${image}:latest")
          fi

          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
            printf 'labels<<EOF\n'
            printf 'org.opencontainers.image.title=king-demo-server\n'
            printf 'org.opencontainers.image.description=King demo server runtime image\n'
            printf 'org.opencontainers.image.created=%s\n' "${created_at}"
            printf 'org.opencontainers.image.revision=%s\n' "${revision}"
            printf 'org.opencontainers.image.source=https://github.com/%s\n' "${GITHUB_REPOSITORY}"
            printf 'EOF\n'
            printf 'created_at=%s\n' "${created_at}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push demo application
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./infra/demo-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-demo.outputs.tags }}
          labels: ${{ steps.meta-demo.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            BUILD_DATE=${{ steps.meta-demo.outputs.created_at }}
            VCS_REF=${{ needs.resolve-release-merge.outputs.release-commit }}
