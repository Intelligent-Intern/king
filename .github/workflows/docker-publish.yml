name: King Mainline Docker Publish

on:
  workflow_run:
    workflows:
      - King Canonical Baseline
    types:
      - completed
    branches:
      - main

concurrency:
  group: king-mainline-docker-publish-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  packages: write

env:
  DEBIAN_FRONTEND: noninteractive
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gate:
    name: Mainline docker publish gate
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      source-run-id: ${{ steps.capture.outputs.source-run-id }}
      trusted-branch: ${{ steps.capture.outputs.trusted-branch }}
      trusted-revision: ${{ steps.capture.outputs.trusted-revision }}
      publish-enabled: ${{ steps.capture.outputs.publish-enabled }}

    steps:
      - name: Capture trusted mainline run metadata
        id: capture
        run: |
          set -euo pipefail

          if [[ "${{ github.event.workflow_run.head_branch }}" != "main" ]]; then
            echo "Refusing docker publish for non-main branch '${{ github.event.workflow_run.head_branch }}'." >&2
            exit 1
          fi

          merge_message="$(jq -r '.workflow_run.head_commit.message // ""' "$GITHUB_EVENT_PATH")"
          publish_enabled="true"

          if echo "${merge_message}" | grep -Eq '^Merge pull request #[0-9]+ from .*/release/'; then
            publish_enabled="false"
            echo "Skipping docker publish for merged release branch." >&2
          fi

          {
            printf 'source-run-id=%s\n' "${{ github.event.workflow_run.id }}"
            printf 'trusted-branch=%s\n' "${{ github.event.workflow_run.head_branch }}"
            printf 'trusted-revision=%s\n' "${{ github.event.workflow_run.head_sha }}"
            printf 'publish-enabled=%s\n' "${publish_enabled}"
          } >> "${GITHUB_OUTPUT}"

          echo "Docker publish enabled for successful canonical mainline run ${{ github.event.workflow_run.id }}."

  docker-build-and-push:
    name: Build and push King PHP ${{ matrix.php-version }}
    needs: gate
    if: needs.gate.outputs.publish-enabled == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        include:
          - php-version: '8.1'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.2'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.3'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.4'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.5'
            platforms: linux/amd64,linux/arm64
            latest: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download amd64 release package
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-linux-amd64
          path: dist/docker-packages/php${{ matrix.php-version }}/linux-amd64
          repository: ${{ github.repository }}
          run-id: ${{ needs.gate.outputs.source-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download arm64 release package
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-linux-arm64
          path: dist/docker-packages/php${{ matrix.php-version }}/linux-arm64
          repository: ${{ github.repository }}
          run-id: ${{ needs.gate.outputs.source-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare runtime image metadata
        id: meta
        env:
          TRUSTED_REVISION: ${{ needs.gate.outputs.trusted-revision }}
          TRUSTED_BRANCH: ${{ needs.gate.outputs.trusted-branch }}
        run: |
          set -euo pipefail
          image_name="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${image_name}"
          revision="${TRUSTED_REVISION}"
          short_sha="$(printf '%s' "${revision}" | cut -c1-12)"
          branch="${TRUSTED_BRANCH}"

          tags=(
            "${image}:php${{ matrix.php-version }}"
            "${image}:sha-${short_sha}-php${{ matrix.php-version }}"
          )

          if [[ "${{ matrix.latest }}" == "true" && "${branch}" == "main" ]]; then
            tags+=("${image}:main" "${image}:latest")
          fi

          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
            printf 'labels<<EOF\n'
            printf 'org.opencontainers.image.title=king\n'
            printf 'org.opencontainers.image.description=King PHP extension runtime image\n'
            printf 'org.opencontainers.image.created=%s\n' "${created_at}"
            printf 'org.opencontainers.image.revision=%s\n' "${revision}"
            printf 'org.opencontainers.image.source=https://github.com/%s\n' "${GITHUB_REPOSITORY}"
            printf 'EOF\n'
            printf 'created_at=%s\n' "${created_at}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push King PHP ${{ matrix.php-version }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./infra/php-runtime.Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            BUILD_DATE=${{ steps.meta.outputs.created_at }}
            VCS_REF=${{ needs.gate.outputs.trusted-revision }}

  docker-build-demo:
    name: Build and push demo application PHP ${{ matrix.php-version }}
    needs: gate
    if: needs.gate.outputs.publish-enabled == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        include:
          - php-version: '8.1'
            latest: false
          - php-version: '8.2'
            latest: false
          - php-version: '8.3'
            latest: false
          - php-version: '8.4'
            latest: false
          - php-version: '8.5'
            latest: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download amd64 release package
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-linux-amd64
          path: dist/docker-packages/php${{ matrix.php-version }}/linux-amd64
          repository: ${{ github.repository }}
          run-id: ${{ needs.gate.outputs.source-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download arm64 release package
        uses: actions/download-artifact@v4
        with:
          name: king-release-package-php${{ matrix.php-version }}-linux-arm64
          path: dist/docker-packages/php${{ matrix.php-version }}/linux-arm64
          repository: ${{ github.repository }}
          run-id: ${{ needs.gate.outputs.source-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare demo image metadata
        id: meta-demo
        env:
          TRUSTED_REVISION: ${{ needs.gate.outputs.trusted-revision }}
          TRUSTED_BRANCH: ${{ needs.gate.outputs.trusted-branch }}
        run: |
          set -euo pipefail
          image_name="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${image_name}-demo"
          revision="${TRUSTED_REVISION}"
          short_sha="$(printf '%s' "${revision}" | cut -c1-12)"
          branch="${TRUSTED_BRANCH}"

          tags=(
            "${image}:php${{ matrix.php-version }}"
            "${image}:sha-${short_sha}-php${{ matrix.php-version }}"
          )

          if [[ "${{ matrix.latest }}" == "true" && "${branch}" == "main" ]]; then
            tags+=("${image}:main" "${image}:latest")
          fi

          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
            printf 'labels<<EOF\n'
            printf 'org.opencontainers.image.title=king-demo-server\n'
            printf 'org.opencontainers.image.description=King demo server runtime image\n'
            printf 'org.opencontainers.image.created=%s\n' "${created_at}"
            printf 'org.opencontainers.image.revision=%s\n' "${revision}"
            printf 'org.opencontainers.image.source=https://github.com/%s\n' "${GITHUB_REPOSITORY}"
            printf 'EOF\n'
            printf 'created_at=%s\n' "${created_at}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push demo application
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./infra/demo-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-demo.outputs.tags }}
          labels: ${{ steps.meta-demo.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            BUILD_DATE=${{ steps.meta-demo.outputs.created_at }}
            VCS_REF=${{ needs.gate.outputs.trusted-revision }}
