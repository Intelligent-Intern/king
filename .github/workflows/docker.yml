name: King Docker Build & Push

on:
  workflow_run:
    workflows:
      - King Canonical Baseline
    types:
      - completed

concurrency:
  group: king-docker-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  artifact-gate:
    name: Docker artifact gate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      run-docker-jobs: ${{ steps.check.outputs.run-docker-jobs }}
      reason: ${{ steps.check.outputs.reason }}
      trusted-checkout-ref: ${{ steps.check.outputs.trusted-checkout-ref }}
      trusted-branch: ${{ steps.check.outputs.trusted-branch }}
      trusted-revision: ${{ steps.check.outputs.trusted-revision }}
      trusted-semver-tag: ${{ steps.check.outputs.trusted-semver-tag }}

    steps:
      - name: Decide whether docker publish jobs should run
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const run = context.payload.workflow_run;
            let runDockerJobs = 'false';
            let reason = `Skipping docker publish for workflow run ${run.id}.`;
            let trustedCheckoutRef = '';
            let trustedBranch = '';
            let trustedRevision = '';
            let trustedSemverTag = '';

            if (
              run.conclusion === 'success'
              && run.event === 'push'
              && run.head_repository?.full_name === `${context.repo.owner}/${context.repo.repo}`
            ) {
              const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
              });

              const hasReleasePackages = data.artifacts.some((artifact) =>
                /^king-release-package-php\d+\.\d+-linux-(amd64|arm64)$/.test(artifact.name)
              );

              if (run.head_branch === 'main' || run.head_branch === 'develop') {
                trustedCheckoutRef = `refs/heads/${run.head_branch}`;
                trustedBranch = run.head_branch;
                trustedRevision = run.head_sha;
              } else {
                const tags = await github.paginate(github.rest.repos.listTags, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 100,
                });

                const matchingTag = tags.find((tag) =>
                  /^v\d+\.\d+\.\d+$/.test(tag.name)
                  && tag.commit?.sha === run.head_sha
                );

                if (matchingTag) {
                  trustedCheckoutRef = `refs/tags/${matchingTag.name}`;
                  trustedRevision = run.head_sha;
                  trustedSemverTag = matchingTag.name;
                }
              }

              if (hasReleasePackages && trustedCheckoutRef !== '') {
                runDockerJobs = 'true';
                reason = `Docker publish enabled for trusted workflow run ${run.id}; release package artifacts were found.`;
              } else {
                reason = hasReleasePackages
                  ? `Skipping docker publish for workflow run ${run.id}; no trusted checkout ref could be derived.`
                  : `Skipping docker publish for workflow run ${run.id}; no release package artifacts were produced.`;
              }
            }

            core.setOutput('run-docker-jobs', runDockerJobs);
            core.setOutput('reason', reason);
            core.setOutput('trusted-checkout-ref', trustedCheckoutRef);
            core.setOutput('trusted-branch', trustedBranch);
            core.setOutput('trusted-revision', trustedRevision);
            core.setOutput('trusted-semver-tag', trustedSemverTag);
            core.notice(reason);

  build-and-push:
    name: Build, Smoke & Push Docker Images
    needs: artifact-gate
    if: ${{ needs.artifact-gate.outputs.run-docker-jobs == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        include:
          - php-version: '8.1'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.2'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.3'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.4'
            platforms: linux/amd64,linux/arm64
            latest: false
          - php-version: '8.5'
            platforms: linux/amd64,linux/arm64
            latest: true

    steps:
      - name: Download trusted source tree
        env:
          GH_TOKEN: ${{ github.token }}
          TRUSTED_CHECKOUT_REF: ${{ needs.artifact-gate.outputs.trusted-checkout-ref }}
        run: |
          set -euo pipefail

          case "${TRUSTED_CHECKOUT_REF}" in
            refs/heads/main|refs/heads/develop|refs/tags/v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Refusing to download untrusted source ref: ${TRUSTED_CHECKOUT_REF}"
              exit 1
              ;;
          esac

          archive_path="${RUNNER_TEMP}/king-source.tar.gz"
          api_path="/repos/${GITHUB_REPOSITORY}/tarball/${TRUSTED_CHECKOUT_REF}"

          gh api "${api_path}" > "${archive_path}"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "${archive_path}" --strip-components=1

      - name: Download amd64 release package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ github.event.workflow_run.id }}" \
            --name "king-release-package-php${{ matrix.php-version }}-linux-amd64" \
            --dir "dist/docker-packages/php${{ matrix.php-version }}/linux-amd64"

      - name: Download arm64 release package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ github.event.workflow_run.id }}" \
            --name "king-release-package-php${{ matrix.php-version }}-linux-arm64" \
            --dir "dist/docker-packages/php${{ matrix.php-version }}/linux-arm64"

      - name: Prepare runtime image metadata
        id: meta
        env:
          TRUSTED_REVISION: ${{ needs.artifact-gate.outputs.trusted-revision }}
          TRUSTED_BRANCH: ${{ needs.artifact-gate.outputs.trusted-branch }}
          TRUSTED_SEMVER_TAG: ${{ needs.artifact-gate.outputs.trusted-semver-tag }}
        run: |
          set -euo pipefail
          image_name="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${image_name}"
          revision="${TRUSTED_REVISION}"
          short_sha="$(printf '%s' "${revision}" | cut -c1-12)"
          branch="${TRUSTED_BRANCH}"
          semver_tag="${TRUSTED_SEMVER_TAG}"

          tags=(
            "${image}:php${{ matrix.php-version }}"
            "${image}:sha-${short_sha}-php${{ matrix.php-version }}"
          )

          if [[ "${{ matrix.latest }}" == "true" ]]; then
            if [[ "${branch}" == "main" ]]; then
              tags+=("${image}:main" "${image}:latest")
            elif [[ "${branch}" == "develop" ]]; then
              tags+=("${image}:develop")
            fi

            if [[ -n "${semver_tag}" ]]; then
              version="${semver_tag#v}"
              IFS='.' read -r major minor patch <<< "${version}"
              tags+=(
                "${image}:${version}"
                "${image}:${major}.${minor}"
                "${image}:${major}"
              )
            fi
          fi

          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
            printf 'labels<<EOF\n'
            printf 'org.opencontainers.image.title=king\n'
            printf 'org.opencontainers.image.description=King PHP extension runtime image\n'
            printf 'org.opencontainers.image.created=%s\n' "${created_at}"
            printf 'org.opencontainers.image.revision=%s\n' "${revision}"
            printf 'org.opencontainers.image.source=https://github.com/%s\n' "${GITHUB_REPOSITORY}"
            printf 'EOF\n'
            printf 'created_at=%s\n' "${created_at}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push King PHP ${{ matrix.php-version }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./infra/php-runtime.Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            BUILD_DATE=${{ steps.meta.outputs.created_at }}
            VCS_REF=${{ needs.artifact-gate.outputs.trusted-revision }}

  build-demo:
    name: Build Demo Application PHP ${{ matrix.php-version }}
    needs: artifact-gate
    if: ${{ needs.artifact-gate.outputs.run-docker-jobs == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        include:
          - php-version: '8.1'
            latest: false
          - php-version: '8.2'
            latest: false
          - php-version: '8.3'
            latest: false
          - php-version: '8.4'
            latest: false
          - php-version: '8.5'
            latest: true

    steps:
      - name: Download trusted source tree
        env:
          GH_TOKEN: ${{ github.token }}
          TRUSTED_CHECKOUT_REF: ${{ needs.artifact-gate.outputs.trusted-checkout-ref }}
        run: |
          set -euo pipefail

          case "${TRUSTED_CHECKOUT_REF}" in
            refs/heads/main|refs/heads/develop|refs/tags/v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Refusing to download untrusted source ref: ${TRUSTED_CHECKOUT_REF}"
              exit 1
              ;;
          esac

          archive_path="${RUNNER_TEMP}/king-source.tar.gz"
          api_path="/repos/${GITHUB_REPOSITORY}/tarball/${TRUSTED_CHECKOUT_REF}"

          gh api "${api_path}" > "${archive_path}"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "${archive_path}" --strip-components=1

      - name: Download amd64 release package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ github.event.workflow_run.id }}" \
            --name "king-release-package-php${{ matrix.php-version }}-linux-amd64" \
            --dir "dist/docker-packages/php${{ matrix.php-version }}/linux-amd64"

      - name: Download arm64 release package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ github.event.workflow_run.id }}" \
            --name "king-release-package-php${{ matrix.php-version }}-linux-arm64" \
            --dir "dist/docker-packages/php${{ matrix.php-version }}/linux-arm64"

      - name: Prepare demo image metadata
        id: meta-demo
        env:
          TRUSTED_REVISION: ${{ needs.artifact-gate.outputs.trusted-revision }}
          TRUSTED_BRANCH: ${{ needs.artifact-gate.outputs.trusted-branch }}
          TRUSTED_SEMVER_TAG: ${{ needs.artifact-gate.outputs.trusted-semver-tag }}
        run: |
          set -euo pipefail
          image_name="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${image_name}-demo"
          revision="${TRUSTED_REVISION}"
          short_sha="$(printf '%s' "${revision}" | cut -c1-12)"
          branch="${TRUSTED_BRANCH}"
          semver_tag="${TRUSTED_SEMVER_TAG}"

          tags=(
            "${image}:php${{ matrix.php-version }}"
            "${image}:sha-${short_sha}-php${{ matrix.php-version }}"
          )

          if [[ "${{ matrix.latest }}" == "true" ]]; then
            if [[ "${branch}" == "main" ]]; then
              tags+=("${image}:main" "${image}:latest")
            elif [[ "${branch}" == "develop" ]]; then
              tags+=("${image}:develop")
            fi

            if [[ -n "${semver_tag}" ]]; then
              version="${semver_tag#v}"
              IFS='.' read -r major minor patch <<< "${version}"
              tags+=(
                "${image}:${version}"
                "${image}:${major}.${minor}"
              )
            fi
          fi

          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
            printf 'labels<<EOF\n'
            printf 'org.opencontainers.image.title=king-demo-server\n'
            printf 'org.opencontainers.image.description=King demo server runtime image\n'
            printf 'org.opencontainers.image.created=%s\n' "${created_at}"
            printf 'org.opencontainers.image.revision=%s\n' "${revision}"
            printf 'org.opencontainers.image.source=https://github.com/%s\n' "${GITHUB_REPOSITORY}"
            printf 'EOF\n'
            printf 'created_at=%s\n' "${created_at}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push demo application
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./infra/demo-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-demo.outputs.tags }}
          labels: ${{ steps.meta-demo.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            BUILD_DATE=${{ steps.meta-demo.outputs.created_at }}
            VCS_REF=${{ needs.artifact-gate.outputs.trusted-revision }}
