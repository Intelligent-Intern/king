name: king-videochat-v1

services:
  videochat-backend-v1:
    build:
      context: ../..
      dockerfile: demo/video-chat/backend-king-php/Dockerfile
      args:
        VIDEOCHAT_BACKEND_PHP_IMAGE: "${VIDEOCHAT_V1_BACKEND_PHP_IMAGE:-php:8.4-cli-trixie}"
        VIDEOCHAT_BACKEND_PREFER_WORKTREE_EXTENSION: "${VIDEOCHAT_V1_BACKEND_PREFER_WORKTREE_EXTENSION:-1}"
    environment:
      VIDEOCHAT_KING_HOST: 0.0.0.0
      VIDEOCHAT_KING_PORT: 18080
      VIDEOCHAT_KING_WS_PORT: 18080
      VIDEOCHAT_KING_SERVER_MODE: http
      VIDEOCHAT_KING_HTTP_WORKERS: "${VIDEOCHAT_V1_HTTP_WORKERS:-24}"
      VIDEOCHAT_KING_WS_PATH: /ws
      VIDEOCHAT_KING_DB_PATH: /data/video-chat.sqlite
      VIDEOCHAT_DEMO_SEED_CALLS: "${VIDEOCHAT_DEMO_SEED_CALLS:-1}"
      VIDEOCHAT_OTEL_SERVICE_NAME: "${VIDEOCHAT_OTEL_SERVICE_NAME_HTTP:-king-videochat-http}"
      VIDEOCHAT_OTEL_ENABLE: "${VIDEOCHAT_OTEL_ENABLE:-}"
      VIDEOCHAT_OTEL_EXPORTER_ENDPOINT: "${VIDEOCHAT_OTEL_EXPORTER_ENDPOINT:-}"
      VIDEOCHAT_OTEL_EXPORTER_PROTOCOL: "${VIDEOCHAT_OTEL_EXPORTER_PROTOCOL:-grpc}"
      VIDEOCHAT_OTEL_METRICS_ENABLE: "${VIDEOCHAT_OTEL_METRICS_ENABLE:-}"
      VIDEOCHAT_OTEL_LOGS_ENABLE: "${VIDEOCHAT_OTEL_LOGS_ENABLE:-}"
      VIDEOCHAT_INFRA_PROVIDER: "${VIDEOCHAT_INFRA_PROVIDER:-auto}"
      VIDEOCHAT_INFRA_DEPLOYMENT_ID: "${VIDEOCHAT_INFRA_DEPLOYMENT_ID:-}"
      VIDEOCHAT_INFRA_CLUSTER_NAME: "${VIDEOCHAT_INFRA_CLUSTER_NAME:-}"
      VIDEOCHAT_INFRA_PUBLIC_DOMAIN: "${VIDEOCHAT_INFRA_PUBLIC_DOMAIN:-${VIDEOCHAT_DEPLOY_DOMAIN:-${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}}}"
      VIDEOCHAT_INFRA_NODE_ROLES: "${VIDEOCHAT_INFRA_NODE_ROLES:-edge,http,ws,sfu}"
      VIDEOCHAT_INFRA_HETZNER_TOKEN: "${VIDEOCHAT_INFRA_HETZNER_TOKEN:-${VIDEOCHAT_DEPLOY_HCLOUD_TOKEN:-}}"
      VIDEOCHAT_INFRA_HETZNER_API_BASE: "${VIDEOCHAT_INFRA_HETZNER_API_BASE:-${VIDEOCHAT_DEPLOY_HCLOUD_API_BASE:-https://api.hetzner.cloud/v1}}"
    ports:
      - "${VIDEOCHAT_V1_BACKEND_BIND:-0.0.0.0}:${VIDEOCHAT_V1_BACKEND_PORT:-18080}:18080"
    volumes:
      - videochat-v1-sqlite:/data
    restart: unless-stopped

  videochat-backend-ws-v1:
    build:
      context: ../..
      dockerfile: demo/video-chat/backend-king-php/Dockerfile
      args:
        VIDEOCHAT_BACKEND_PHP_IMAGE: "${VIDEOCHAT_V1_BACKEND_PHP_IMAGE:-php:8.4-cli-trixie}"
        VIDEOCHAT_BACKEND_PREFER_WORKTREE_EXTENSION: "${VIDEOCHAT_V1_BACKEND_PREFER_WORKTREE_EXTENSION:-1}"
    environment:
      VIDEOCHAT_KING_HOST: 0.0.0.0
      VIDEOCHAT_KING_PORT: 18080
      VIDEOCHAT_KING_WS_PORT: 18080
      VIDEOCHAT_KING_SERVER_MODE: ws
      VIDEOCHAT_KING_WS_WORKERS: "${VIDEOCHAT_V1_WS_WORKERS:-8}"
      VIDEOCHAT_KING_WS_PATH: /ws
      VIDEOCHAT_KING_DB_PATH: /data/video-chat.sqlite
      VIDEOCHAT_DEMO_SEED_CALLS: "${VIDEOCHAT_DEMO_SEED_CALLS:-1}"
      VIDEOCHAT_OTEL_SERVICE_NAME: "${VIDEOCHAT_OTEL_SERVICE_NAME_WS:-king-videochat-ws}"
      VIDEOCHAT_OTEL_ENABLE: "${VIDEOCHAT_OTEL_ENABLE:-}"
      VIDEOCHAT_OTEL_EXPORTER_ENDPOINT: "${VIDEOCHAT_OTEL_EXPORTER_ENDPOINT:-}"
      VIDEOCHAT_OTEL_EXPORTER_PROTOCOL: "${VIDEOCHAT_OTEL_EXPORTER_PROTOCOL:-grpc}"
      VIDEOCHAT_OTEL_METRICS_ENABLE: "${VIDEOCHAT_OTEL_METRICS_ENABLE:-}"
      VIDEOCHAT_OTEL_LOGS_ENABLE: "${VIDEOCHAT_OTEL_LOGS_ENABLE:-}"
    ports:
      - "${VIDEOCHAT_V1_BACKEND_WS_BIND:-0.0.0.0}:${VIDEOCHAT_V1_BACKEND_WS_PORT:-18081}:18080"
    volumes:
      - videochat-v1-sqlite:/data
    restart: unless-stopped

  videochat-backend-sfu-v1:
    build:
      context: ../..
      dockerfile: demo/video-chat/backend-king-php/Dockerfile
      args:
        VIDEOCHAT_BACKEND_PHP_IMAGE: "${VIDEOCHAT_V1_BACKEND_PHP_IMAGE:-php:8.4-cli-trixie}"
        VIDEOCHAT_BACKEND_PREFER_WORKTREE_EXTENSION: "${VIDEOCHAT_V1_BACKEND_PREFER_WORKTREE_EXTENSION:-1}"
    environment:
      VIDEOCHAT_KING_HOST: 0.0.0.0
      VIDEOCHAT_KING_PORT: 18080
      VIDEOCHAT_KING_WS_PORT: 18080
      VIDEOCHAT_KING_SERVER_MODE: ws
      VIDEOCHAT_KING_WS_WORKERS: "${VIDEOCHAT_V1_SFU_WORKERS:-8}"
      VIDEOCHAT_KING_WS_PATH: /sfu
      VIDEOCHAT_KING_DB_PATH: /data/video-chat.sqlite
      VIDEOCHAT_DEMO_SEED_CALLS: "${VIDEOCHAT_DEMO_SEED_CALLS:-1}"
      VIDEOCHAT_OTEL_SERVICE_NAME: "${VIDEOCHAT_OTEL_SERVICE_NAME_SFU:-king-videochat-sfu}"
      VIDEOCHAT_OTEL_ENABLE: "${VIDEOCHAT_OTEL_ENABLE:-}"
      VIDEOCHAT_OTEL_EXPORTER_ENDPOINT: "${VIDEOCHAT_OTEL_EXPORTER_ENDPOINT:-}"
      VIDEOCHAT_OTEL_EXPORTER_PROTOCOL: "${VIDEOCHAT_OTEL_EXPORTER_PROTOCOL:-grpc}"
      VIDEOCHAT_OTEL_METRICS_ENABLE: "${VIDEOCHAT_OTEL_METRICS_ENABLE:-}"
      VIDEOCHAT_OTEL_LOGS_ENABLE: "${VIDEOCHAT_OTEL_LOGS_ENABLE:-}"
    ports:
      - "${VIDEOCHAT_V1_BACKEND_SFU_BIND:-0.0.0.0}:${VIDEOCHAT_V1_BACKEND_SFU_PORT:-18082}:18080"
    volumes:
      - videochat-v1-sqlite:/data
    restart: unless-stopped

  videochat-turn-v1:
    image: "${VIDEOCHAT_V1_TURN_IMAGE:-coturn/coturn:4.6.2}"
    profiles:
      - turn
    environment:
      VIDEOCHAT_V1_TURN_REALM: "${VIDEOCHAT_V1_TURN_REALM:-king-videochat.local}"
      VIDEOCHAT_V1_TURN_STATIC_AUTH_SECRET: "${VIDEOCHAT_V1_TURN_STATIC_AUTH_SECRET:-}"
      VIDEOCHAT_V1_TURN_STATIC_AUTH_SECRET_FILE: "${VIDEOCHAT_V1_TURN_STATIC_AUTH_SECRET_FILE:-}"
      VIDEOCHAT_V1_TURN_EXTERNAL_IP: "${VIDEOCHAT_V1_TURN_EXTERNAL_IP:-}"
      VIDEOCHAT_V1_TURN_RELAY_MIN_PORT: "${VIDEOCHAT_V1_TURN_RELAY_MIN_PORT:-49160}"
      VIDEOCHAT_V1_TURN_RELAY_MAX_PORT: "${VIDEOCHAT_V1_TURN_RELAY_MAX_PORT:-49200}"
    entrypoint:
      - sh
      - -lc
    command:
      - |
        secret="$${VIDEOCHAT_V1_TURN_STATIC_AUTH_SECRET}"
        if [ -z "$${secret}" ] && [ -n "$${VIDEOCHAT_V1_TURN_STATIC_AUTH_SECRET_FILE}" ]; then
          secret="$$(cat "$${VIDEOCHAT_V1_TURN_STATIC_AUTH_SECRET_FILE}")"
        fi
        if [ -z "$${secret}" ]; then
          echo "VIDEOCHAT_V1_TURN_STATIC_AUTH_SECRET or VIDEOCHAT_V1_TURN_STATIC_AUTH_SECRET_FILE is required" >&2
          exit 64
        fi
        external_ip_arg=""
        if [ -n "$${VIDEOCHAT_V1_TURN_EXTERNAL_IP}" ]; then
          external_ip_arg="--external-ip=$${VIDEOCHAT_V1_TURN_EXTERNAL_IP}"
        fi
        exec turnserver \
          --listening-ip=0.0.0.0 \
          --listening-port=3478 \
          $${external_ip_arg} \
          --realm="$${VIDEOCHAT_V1_TURN_REALM}" \
          --use-auth-secret \
          --static-auth-secret="$${secret}" \
          --fingerprint \
          --no-cli \
          --no-tls \
          --no-dtls \
          --min-port="$${VIDEOCHAT_V1_TURN_RELAY_MIN_PORT}" \
          --max-port="$${VIDEOCHAT_V1_TURN_RELAY_MAX_PORT}" \
          --log-file=stdout
    ports:
      - "${VIDEOCHAT_V1_TURN_PORT:-3478}:3478/tcp"
      - "${VIDEOCHAT_V1_TURN_PORT:-3478}:3478/udp"
      - "${VIDEOCHAT_V1_TURN_RELAY_MIN_PORT:-49160}-${VIDEOCHAT_V1_TURN_RELAY_MAX_PORT:-49200}:${VIDEOCHAT_V1_TURN_RELAY_MIN_PORT:-49160}-${VIDEOCHAT_V1_TURN_RELAY_MAX_PORT:-49200}/udp"
    restart: unless-stopped

  videochat-frontend-v1:
    build:
      context: ../..
      dockerfile: demo/video-chat/frontend-vue/Dockerfile
      args:
        VITE_VIDEOCHAT_BACKEND_ORIGIN: "${VIDEOCHAT_V1_BACKEND_ORIGIN:-${VIDEOCHAT_V1_PUBLIC_SCHEME:-http}://${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}:${VIDEOCHAT_V1_BACKEND_PORT:-18080}}"
        VITE_VIDEOCHAT_BACKEND_PORT: "${VIDEOCHAT_V1_BACKEND_PORT:-18080}"
        VITE_VIDEOCHAT_WS_ORIGIN: "${VIDEOCHAT_V1_BACKEND_WS_ORIGIN:-${VIDEOCHAT_V1_PUBLIC_SCHEME:-http}://${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}:${VIDEOCHAT_V1_BACKEND_WS_PORT:-18081}}"
        VITE_VIDEOCHAT_WS_PORT: "${VIDEOCHAT_V1_BACKEND_WS_PORT:-18081}"
        VITE_VIDEOCHAT_SFU_ORIGIN: "${VIDEOCHAT_V1_BACKEND_SFU_ORIGIN:-${VIDEOCHAT_V1_PUBLIC_SCHEME:-http}://${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}:${VIDEOCHAT_V1_BACKEND_SFU_PORT:-18082}}"
        VITE_VIDEOCHAT_SFU_PORT: "${VIDEOCHAT_V1_BACKEND_SFU_PORT:-18082}"
        VITE_VIDEOCHAT_ALLOW_INSECURE_WS: "${VIDEOCHAT_V1_ALLOW_INSECURE_WS:-${VITE_VIDEOCHAT_ALLOW_INSECURE_WS:-}}"
        VITE_VIDEOCHAT_ICE_SERVERS: "${VITE_VIDEOCHAT_ICE_SERVERS:-}"
        VITE_VIDEOCHAT_ENABLE_SFU: "${VITE_VIDEOCHAT_ENABLE_SFU:-}"
        VITE_VIDEOCHAT_ENABLE_MEDIAPIPE: "${VITE_VIDEOCHAT_ENABLE_MEDIAPIPE:-}"
        VITE_VIDEOCHAT_ENABLE_TFJS: "${VITE_VIDEOCHAT_ENABLE_TFJS:-}"
    environment:
      VIDEOCHAT_VUE_HOST: 0.0.0.0
      VIDEOCHAT_VUE_PORT: 5174
      VIDEOCHAT_VUE_ALLOWED_HOSTS: "${VIDEOCHAT_VUE_ALLOWED_HOSTS:-}"
      CHOKIDAR_USEPOLLING: "${VIDEOCHAT_VUE_POLLING:-1}"
      VITE_VIDEOCHAT_BACKEND_ORIGIN: "${VIDEOCHAT_V1_BACKEND_ORIGIN:-${VIDEOCHAT_V1_PUBLIC_SCHEME:-http}://${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}:${VIDEOCHAT_V1_BACKEND_PORT:-18080}}"
      VITE_VIDEOCHAT_BACKEND_PORT: "${VIDEOCHAT_V1_BACKEND_PORT:-18080}"
      VITE_VIDEOCHAT_WS_ORIGIN: "${VIDEOCHAT_V1_BACKEND_WS_ORIGIN:-${VIDEOCHAT_V1_PUBLIC_SCHEME:-http}://${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}:${VIDEOCHAT_V1_BACKEND_WS_PORT:-18081}}"
      VITE_VIDEOCHAT_WS_PORT: "${VIDEOCHAT_V1_BACKEND_WS_PORT:-18081}"
      VITE_VIDEOCHAT_SFU_ORIGIN: "${VIDEOCHAT_V1_BACKEND_SFU_ORIGIN:-${VIDEOCHAT_V1_PUBLIC_SCHEME:-http}://${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}:${VIDEOCHAT_V1_BACKEND_SFU_PORT:-18082}}"
      VITE_VIDEOCHAT_SFU_PORT: "${VIDEOCHAT_V1_BACKEND_SFU_PORT:-18082}"
      VITE_VIDEOCHAT_ALLOW_INSECURE_WS: "${VIDEOCHAT_V1_ALLOW_INSECURE_WS:-${VITE_VIDEOCHAT_ALLOW_INSECURE_WS:-}}"
      VITE_VIDEOCHAT_ICE_SERVERS: "${VITE_VIDEOCHAT_ICE_SERVERS:-}"
      VITE_VIDEOCHAT_ENABLE_SFU: "${VITE_VIDEOCHAT_ENABLE_SFU:-}"
      VITE_VIDEOCHAT_ENABLE_MEDIAPIPE: "${VITE_VIDEOCHAT_ENABLE_MEDIAPIPE:-}"
      VITE_VIDEOCHAT_ENABLE_TFJS: "${VITE_VIDEOCHAT_ENABLE_TFJS:-}"
    depends_on:
      - videochat-backend-v1
      - videochat-backend-ws-v1
      - videochat-backend-sfu-v1
    volumes:
      - ./frontend-vue:/workspace
    command:
      - sh
      - -lc
      - |
        # Always use image-baked dependencies to avoid stale host node_modules.
        if [ -e /workspace/node_modules ] || [ -L /workspace/node_modules ]; then
          rm -rf /workspace/node_modules
        fi
        ln -s /app/node_modules /workspace/node_modules
        rm -rf /workspace/.vite /workspace/node_modules/.vite
        cd /workspace
        npm run dev -- --force --host 0.0.0.0 --port 5174 --strictPort
    ports:
      - "${VIDEOCHAT_V1_FRONTEND_BIND:-0.0.0.0}:${VIDEOCHAT_V1_FRONTEND_PORT:-5176}:5174"
    restart: unless-stopped

  videochat-edge-v1:
    profiles:
      - edge
    build:
      context: ../..
      dockerfile: demo/video-chat/edge/Dockerfile
      args:
        VITE_VIDEOCHAT_BACKEND_ORIGIN: "${VIDEOCHAT_V1_BACKEND_ORIGIN:-${VIDEOCHAT_V1_PUBLIC_SCHEME:-http}://${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}:${VIDEOCHAT_V1_BACKEND_PORT:-18080}}"
        VITE_VIDEOCHAT_BACKEND_PORT: "${VIDEOCHAT_V1_FRONTEND_BACKEND_PORT_FALLBACK:-}"
        VITE_VIDEOCHAT_WS_ORIGIN: "${VIDEOCHAT_V1_BACKEND_WS_ORIGIN:-${VIDEOCHAT_V1_PUBLIC_SCHEME:-http}://${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}:${VIDEOCHAT_V1_BACKEND_WS_PORT:-18081}}"
        VITE_VIDEOCHAT_WS_PORT: "${VIDEOCHAT_V1_FRONTEND_WS_PORT_FALLBACK:-}"
        VITE_VIDEOCHAT_SFU_ORIGIN: "${VIDEOCHAT_V1_BACKEND_SFU_ORIGIN:-${VIDEOCHAT_V1_PUBLIC_SCHEME:-http}://${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}:${VIDEOCHAT_V1_BACKEND_SFU_PORT:-18082}}"
        VITE_VIDEOCHAT_SFU_PORT: "${VIDEOCHAT_V1_FRONTEND_SFU_PORT_FALLBACK:-}"
        VITE_VIDEOCHAT_ALLOW_INSECURE_WS: "${VIDEOCHAT_V1_ALLOW_INSECURE_WS:-${VITE_VIDEOCHAT_ALLOW_INSECURE_WS:-}}"
        VITE_VIDEOCHAT_ICE_SERVERS: "${VITE_VIDEOCHAT_ICE_SERVERS:-}"
        VITE_VIDEOCHAT_ENABLE_SFU: "${VITE_VIDEOCHAT_ENABLE_SFU:-}"
        VITE_VIDEOCHAT_ENABLE_MEDIAPIPE: "${VITE_VIDEOCHAT_ENABLE_MEDIAPIPE:-}"
        VITE_VIDEOCHAT_ENABLE_TFJS: "${VITE_VIDEOCHAT_ENABLE_TFJS:-}"
    environment:
      VIDEOCHAT_EDGE_HOST: 0.0.0.0
      VIDEOCHAT_EDGE_HTTP_PORT: 8080
      VIDEOCHAT_EDGE_HTTPS_PORT: 8443
      VIDEOCHAT_EDGE_DOMAIN: "${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}"
      VIDEOCHAT_EDGE_API_DOMAIN: "${VIDEOCHAT_DEPLOY_API_DOMAIN:-api.${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}}"
      VIDEOCHAT_EDGE_WS_DOMAIN: "${VIDEOCHAT_DEPLOY_WS_DOMAIN:-ws.${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}}"
      VIDEOCHAT_EDGE_SFU_DOMAIN: "${VIDEOCHAT_DEPLOY_SFU_DOMAIN:-sfu.${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}}"
      VIDEOCHAT_EDGE_TURN_DOMAIN: "${VIDEOCHAT_DEPLOY_TURN_DOMAIN:-turn.${VIDEOCHAT_V1_PUBLIC_HOST:-127.0.0.1}}"
      VIDEOCHAT_EDGE_CERT_FILE: /run/certs/live/fullchain.pem
      VIDEOCHAT_EDGE_KEY_FILE: /run/certs/live/privkey.pem
      VIDEOCHAT_EDGE_API_UPSTREAM: videochat-backend-v1:18080
      VIDEOCHAT_EDGE_WS_UPSTREAM: videochat-backend-ws-v1:18080
      VIDEOCHAT_EDGE_SFU_UPSTREAM: videochat-backend-sfu-v1:18080
      VIDEOCHAT_EDGE_WRITE_STALL_TIMEOUT_SECONDS: "${VIDEOCHAT_EDGE_WRITE_STALL_TIMEOUT_SECONDS:-10}"
      VIDEOCHAT_EDGE_ZERO_WRITE_SLEEP_MICROS: "${VIDEOCHAT_EDGE_ZERO_WRITE_SLEEP_MICROS:-10000}"
    depends_on:
      - videochat-backend-v1
      - videochat-backend-ws-v1
      - videochat-backend-sfu-v1
    ports:
      - "${VIDEOCHAT_V1_EDGE_HTTP_BIND:-0.0.0.0}:${VIDEOCHAT_V1_EDGE_HTTP_PORT:-80}:8080"
      - "${VIDEOCHAT_V1_EDGE_HTTPS_BIND:-0.0.0.0}:${VIDEOCHAT_V1_EDGE_HTTPS_PORT:-443}:8443"
    restart: unless-stopped

volumes:
  videochat-v1-sqlite:
