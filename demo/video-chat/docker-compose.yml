# Historical legacy compose for the previous Node-based demo runtime.
# New-stack compose (backend-king-php + frontend-vue) lands in V1 follow-up leaves.
services:
  videochat-backend:
    container_name: king-videochat-backend
    build:
      context: ../..
      dockerfile: demo/video-chat/backend/Dockerfile
      args:
        IIBIN_SOURCE: ${IIBIN_SOURCE:-1.0.5-beta}
    environment:
      KING_DEMO_HOST: 0.0.0.0
      KING_DEMO_PORT: 8080
      KING_DEMO_DB_PATH: /data/video-chat.sqlite
    ports:
      - "${VIDEOCHAT_BACKEND_PORT:-8080}:8080"
    volumes:
      - videochat-sqlite:/data
    restart: unless-stopped

  videochat-frontend:
    container_name: king-videochat-frontend
    build:
      context: ../..
      dockerfile: demo/video-chat/frontend/Dockerfile
      args:
        IIBIN_SOURCE: ${IIBIN_SOURCE:-1.0.5-beta}
    depends_on:
      - videochat-backend
    environment:
      VIDEOCHAT_BACKEND_ORIGIN: http://videochat-backend:8080
    ports:
      - "${VIDEOCHAT_FRONTEND_PORT:-5173}:5173"
    restart: unless-stopped

volumes:
  videochat-sqlite:
