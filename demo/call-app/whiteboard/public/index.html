<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="king-call-app-key" content="whiteboard">
    <meta name="king-call-app-bridge" content="king.call_app.iframe.v1">
    <title>Whiteboard Call App</title>
    <link rel="stylesheet" href="./whiteboard.css">
  </head>
  <body>
    <main class="whiteboard-app">
      <header class="toolbar" aria-label="Whiteboard tools">
        <section class="tool-group" aria-label="Drawing tools">
          <button type="button" data-tool="select">Select</button>
          <button type="button" data-tool="pen" class="active">Pen</button>
          <button type="button" data-tool="highlighter">Mark</button>
          <button type="button" data-tool="line">Line</button>
          <button type="button" data-tool="rect">Rect</button>
          <button type="button" data-tool="ellipse">Oval</button>
          <button type="button" data-tool="text">Text</button>
          <button type="button" data-tool="sticky">Note</button>
          <button type="button" data-tool="delete">Del</button>
        </section>
        <section class="tool-group" aria-label="Colors">
          <button type="button" class="swatch active" data-color="#1582bf" aria-label="Cyan"></button>
          <button type="button" class="swatch" data-color="#59c7f2" aria-label="Light cyan"></button>
          <button type="button" class="swatch" data-color="#00652f" aria-label="Green"></button>
          <button type="button" class="swatch" data-color="#f47221" aria-label="Orange"></button>
          <button type="button" class="swatch" data-color="#ef4423" aria-label="Red"></button>
          <button type="button" class="swatch" data-color="#000010" aria-label="Navy"></button>
        </section>
        <section class="tool-group" aria-label="Stroke width">
          <input id="width" type="range" min="2" max="18" value="5">
        </section>
        <section class="tool-group" aria-label="History">
          <button id="undo" type="button">Undo</button>
          <button id="redo" type="button">Redo</button>
        </section>
        <section class="tool-group" aria-label="Exports">
          <button id="exportPng" type="button">PNG</button>
          <button id="exportPdf" type="button">PDF</button>
        </section>
        <span class="hint">Drag selected items to move them.</span>
        <span id="modeBadge" class="viewer-badge">Waiting</span>
      </header>

      <section class="canvas-shell">
        <canvas id="board" width="1600" height="900"></canvas>
        <form id="inlineEditor" class="inline-editor">
          <textarea id="inlineText" maxlength="500" placeholder="Text"></textarea>
          <button id="inlineSubmit" type="submit" aria-label="Insert">Send</button>
        </form>
      </section>

      <footer class="statusbar">
        <span id="status">Waiting for Call App launch.</span>
        <span id="clock">0 ops</span>
      </footer>
    </main>

    <script src="./whiteboard.js"></script>
  </body>
</html>
