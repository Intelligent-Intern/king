name: king-model-inference-v1

services:
  inference-node-a:
    build:
      context: ../..
      dockerfile: demo/model-inference/backend-king-php/Dockerfile
      args:
        MODEL_INFERENCE_BACKEND_PHP_IMAGE: "${MODEL_INFERENCE_V1_PHP_IMAGE:-php:8.4-cli-trixie}"
    environment:
      MODEL_INFERENCE_KING_HOST: 0.0.0.0
      MODEL_INFERENCE_KING_PORT: 18090
      MODEL_INFERENCE_KING_WS_PORT: 18090
      MODEL_INFERENCE_KING_WS_PATH: /ws
      MODEL_INFERENCE_KING_DB_PATH: /data/model-inference.sqlite
      MODEL_INFERENCE_KING_OBJECT_STORE_ROOT: /data/object-store
      MODEL_INFERENCE_KING_NODE_ID: node_a
      MODEL_INFERENCE_KING_ENV: compose
      MODEL_INFERENCE_AUTOSEED: "1"
      MODEL_INFERENCE_AUTOSEED_FIXTURE_DIR: /opt/llama-cpp/llama-b8802
      MODEL_INFERENCE_DEBUG_REQUESTS: "${MODEL_INFERENCE_DEBUG_REQUESTS:-0}"
    ports:
      - "${MODEL_INFERENCE_V1_NODE_A_PORT:-18090}:18090"
    volumes:
      - inference-node-a-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18090/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  inference-node-b:
    build:
      context: ../..
      dockerfile: demo/model-inference/backend-king-php/Dockerfile
      args:
        MODEL_INFERENCE_BACKEND_PHP_IMAGE: "${MODEL_INFERENCE_V1_PHP_IMAGE:-php:8.4-cli-trixie}"
    environment:
      MODEL_INFERENCE_KING_HOST: 0.0.0.0
      MODEL_INFERENCE_KING_PORT: 18090
      MODEL_INFERENCE_KING_WS_PORT: 18090
      MODEL_INFERENCE_KING_WS_PATH: /ws
      MODEL_INFERENCE_KING_DB_PATH: /data/model-inference.sqlite
      MODEL_INFERENCE_KING_OBJECT_STORE_ROOT: /data/object-store
      MODEL_INFERENCE_KING_NODE_ID: node_b
      MODEL_INFERENCE_KING_ENV: compose
      MODEL_INFERENCE_AUTOSEED: "1"
      MODEL_INFERENCE_AUTOSEED_FIXTURE_DIR: /opt/llama-cpp/llama-b8802
      MODEL_INFERENCE_DEBUG_REQUESTS: "${MODEL_INFERENCE_DEBUG_REQUESTS:-0}"
    ports:
      - "${MODEL_INFERENCE_V1_NODE_B_PORT:-18092}:18090"
    volumes:
      - inference-node-b-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18090/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

volumes:
  inference-node-a-data:
  inference-node-b-data:
