<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KingRT</title>
    <style>
:root {
  color-scheme: dark;
  font-family: var(--ii-font-family-sans, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif);

  /* Typography foundations */
  --ii-font-family-sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  --ii-font-family-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
  --ii-font-sans: var(--ii-font-family-sans);
  --ii-font-mono: var(--ii-font-family-mono);
  --ii-font-weight-regular: 400;
  --ii-font-weight-medium: 600;
  --ii-font-weight-bold: 700;
  --ii-lineheight-tight: 1.15;
  --ii-lineheight-normal: 1.35;
  --ii-text-2xl: 1.75rem;
  --ii-text-xl: 1.375rem;
  --ii-text-l: 1.125rem;
  --ii-text-m: 1rem;
  --ii-text-s: 0.875rem;
  --ii-text-xs: 0.75rem;

  /* Background colors */
  --ii-bg: #0b1424;
  --ii-bg-rgb: 11, 20, 36;
  --ii-surface: #0f1a2c;
  --ii-surface-rgb: 15, 26, 44;
  --ii-surface-alt-0: #122033;
  --ii-surface-alt: #142338;
  --ii-surface-alt-2: #172940;
  --ii-surface-alt-3: #1b2f47;
  --ii-surface-muted: rgba(11, 20, 36, 0.92);
  --ii-overlay: rgba(0, 0, 0, 0.6);
  --ii-overlay-light: rgba(0, 0, 0, 0.08);

  /* Accent / Primary colors */
  --ii-accent: #1482be;
  --ii-accent-rgb: 20, 130, 190;
  --ii-primary: rgba(20, 130, 190, 0.75);
  --ii-primary-tint: color-mix(in srgb, var(--ii-surface) 78%, var(--ii-accent) 22%);
  --ii-primary-tint-2: color-mix(in srgb, var(--ii-surface) 66%, var(--ii-accent) 34%);
  --ii-primary-strong: rgba(20, 130, 190, 0.9);
  --ii-primary-hover: rgba(20, 130, 190, 0.75);
  --ii-primary-bg: rgba(20, 130, 190, 0.06);

  /* Danger colors */
  --ii-danger: #ff7878;
  --ii-danger-bg: rgba(194, 54, 54, 0.22);
  --ii-danger-border: rgba(194, 54, 54, 0.35);
  --ii-warning: #f0b93d;
  --ii-warning-bg: rgba(240, 185, 61, 0.2);
  --ii-warning-border: rgba(240, 185, 61, 0.35);
  --ii-success: #28b46e;
  --ii-success-bg: rgba(40, 180, 110, 0.2);
  --ii-success-border: rgba(40, 180, 110, 0.35);
  --ii-conflict: #f97373;
  --ii-conflict-bg: rgba(249, 115, 115, 0.2);
  --ii-conflict-border: rgba(249, 115, 115, 0.35);

  /* Charts */
  --ii-chart-series-1: var(--ii-accent);
  --ii-chart-series-2: var(--ii-success);
  --ii-chart-series-3: var(--ii-warning);
  --ii-chart-series-4: var(--ii-danger);
  --ii-chart-series-5: color-mix(in srgb, var(--ii-accent) 65%, var(--ii-warning));
  --ii-chart-series-6: color-mix(in srgb, var(--ii-success) 70%, var(--ii-accent));
  --ii-chart-series-7: color-mix(in srgb, var(--ii-danger) 75%, var(--ii-warning));
  --ii-chart-series-8: color-mix(in srgb, var(--ii-muted) 35%, var(--ii-accent));
  --ii-chart-heatmap-hot: var(--ii-danger);
  --ii-chart-heatmap-cold: var(--ii-surface-alt-3);

  /* Border colors */
  --ii-border: #23354c;
  --ii-border-subtle: #1a2a3f;
  --ii-border-strong: #314861;
  --ii-border-input: #36506e;
  --ii-border-focus: #1482be;
  --ii-border-width: 0.0625rem;

  /* Text colors */
  --ii-text: rgba(233, 242, 255, 0.92);
  --ii-text-rgb: 233, 242, 255;
  --ii-text-muted: #dbe6f3;
  --ii-text-muted-2: #c2d0e2;
  --ii-text-muted-3: #9db0c7;
  --ii-text-inverted: rgba(233, 242, 255, 0.92);
  --ii-text-inverted-bg: rgba(233, 242, 255, 0.92);
  --ii-text-inverted-hover: rgba(233, 242, 255, 0.35);
  --ii-text-highlight: rgba(233, 242, 255, 0.45);
  --ii-muted: rgba(180, 180, 180, 0.95);
  --ii-muted-rgb: 180, 180, 180;
  --ii-muted-soft: #aab7c7;
  --ii-muted-soft-2: #94a3b8;

  /* Scrollbar */
  --ii-scrollbar: rgba(148, 163, 184, 0.35);
  --ii-scrollbar-hover: rgba(148, 163, 184, 0.5);

  /* Border radius */
  --ii-radius-xs: 4px;
  --ii-radius-sm: 6px;
  --ii-radius-md: 8px;
  --ii-radius-lg: 12px;
  --ii-radius-xl: 16px;
  --ii-radius-2xl: 20px;
  --ii-radius-round: 50px;
  --ii-input-radius: 0;
  --ii-input-bg: color-mix(in srgb, var(--ii-bg) 80%, var(--ii-surface));
  --ii-nav-radius: 0;
  --ii-nav-shadow: none;
  --ii-nav-group-bg-accounting: #0e7490;
  --ii-nav-group-bg-procurement: #065f46;
  --ii-nav-group-bg-hr: #14532d;
  --ii-nav-group-bg-insurance: #7c2d12;
  --ii-nav-group-bg-ministry: #4c1d95;
  --ii-nav-group-bg-treasury: #0f766e;
  --ii-nav-group-bg-platform: #334155;

  /* Spacing */
  --ii-gap: 12px;
  --ii-gap-sm: 8px;
  --ii-gap-xs: 4px;
  --ii-control-height: 2.5rem;

  /* Shadows */
  --ii-shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.25);
  --ii-shadow-md: 0 14px 34px rgba(0, 0, 0, 0.4);
  --ii-shadow-lg: 0 28px 80px rgba(0, 0, 0, 0.42);

  /* Motion */
  --ii-motion-duration-fast: 140ms;
  --ii-motion-duration-normal: 220ms;
  --ii-motion-duration-slow: 320ms;
  --ii-motion-ease-standard: cubic-bezier(0.2, 0, 0, 1);
  --ii-motion-ease-enter: cubic-bezier(0.16, 1, 0.3, 1);
  --ii-motion-ease-exit: cubic-bezier(0.7, 0, 0.84, 0);

  /* Auth glows */
  --ii-auth-glow-1: color-mix(in srgb, var(--ii-accent) 22%, transparent);
  --ii-auth-glow-2: color-mix(in srgb, var(--ii-accent) 10%, transparent);

  /* Terminal (base theme) */
  --ii-terminal-bg: color-mix(in srgb, var(--ii-bg) 55%, black);
  --ii-terminal-border: color-mix(in srgb, var(--ii-border) 75%, transparent);
  --ii-terminal-text: rgba(233, 242, 255, 0.92);
  --ii-terminal-muted: color-mix(in srgb, var(--ii-terminal-text) 70%, transparent);
  --ii-terminal-accent: color-mix(in srgb, var(--ii-accent) 75%, white);

  /* Safe areas */
  --ii-safe-area-top: env(safe-area-inset-top, 0px);
  --ii-safe-area-right: env(safe-area-inset-right, 0px);
  --ii-safe-area-bottom: env(safe-area-inset-bottom, 0px);
  --ii-safe-area-left: env(safe-area-inset-left, 0px);

  /* Debug (dev mode only) */
  --ii-debug: #ff00ff;
  --ii-debug-border: rgba(255, 0, 255, 0.55);

  /* Chip colors */
  --ii-chip-base: #0f1724;
  --ii-chip-border: #2e435d;
  --ii-chip-blue: #14344b;
  --ii-chip-purple: #282650;
  --ii-chip-slate: #1b2c40;
  --ii-chip-gray: #222e3e;
  --ii-chip-green: #173a31;
  --ii-chip-navy: #1a2940;
  --ii-chip-steel: #263646;

  /* Flow colors */
  --ii-flow-cyan: rgba(56, 189, 248, 0.95);
  --ii-flow-green-fill: rgba(52, 211, 153, 0.18);
  --ii-flow-green-strong: rgba(34, 197, 94, 0.95);
  --ii-flow-purple-fill: rgba(168, 85, 247, 0.18);
  --ii-flow-amber-fill: rgba(245, 158, 11, 0.22);
  --ii-flow-amber-stroke: rgba(245, 158, 11, 0.35);

  /* Workflow builder tokens */
  --ii-wf-canvas-bg: var(--ii-primary-strong);
  --ii-wf-node-bg: var(--ii-surface-muted);
  --ii-wf-node-text: var(--ii-text);
  --ii-wf-node-border: var(--ii-chip-border);
  --ii-wf-head-bg: var(--ii-surface-muted);
  --ii-wf-pill-active-bg: var(--ii-primary);
  --ii-wf-pill-active-text: var(--ii-text);
  --ii-wf-status-ok: var(--ii-flow-green-strong);
  --ii-wf-status-warn: var(--ii-flow-amber-stroke);
  --ii-wf-status-error: var(--ii-danger);
  --ii-wf-edge: var(--ii-chip-navy);
  --ii-wf-listen-accent: var(--ii-primary-strong);

  /* Application Builder specific */
  --ii-builder-bg: #111118;
  --ii-builder-surface: rgba(8, 10, 20, 0.35);
  --ii-builder-border: var(--ii-border-subtle);
  --ii-builder-radius: 50px;
}

html,
body,
#app {
  height: 100%;
}

body {
  margin: 0;
  padding: 0;
  background: var(--ii-bg);
  color: var(--ii-text);
}

* {
  scrollbar-width: thin;
  scrollbar-color: var(--ii-scrollbar) transparent;
}

*::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

*::-webkit-scrollbar-track {
  background: transparent;
}

*::-webkit-scrollbar-thumb {
  background: var(--ii-scrollbar);
  border-radius: 0;
  border: 2px solid transparent;
  background-clip: padding-box;
}

*::-webkit-scrollbar-thumb:hover {
  background: var(--ii-scrollbar-hover);
  border: 2px solid transparent;
  background-clip: padding-box;
}

#app {
  min-height: 100%;
}

html.ii-mobile-nav-open,
body.ii-mobile-nav-open {
  overflow: hidden !important;
}

html.ii-ui-debug [data-refactor="v2"],
html.ii-ui-debug .ii-refactor-mark [data-refactor="v2"] {
  outline: 3px solid var(--ii-debug);
  outline-offset: 2px;
}

html.ii-ui-debug [data-ui-core='1'] {
  outline: 3px solid var(--ii-debug);
  outline-offset: 2px;
}

html.ii-ui-debug [data-ui-core-name] {
  outline: 3px solid var(--ii-debug);
  outline-offset: 2px;
}

html.ii-ui-debug [data-ui-core-name] {
  position: relative;
}

html.ii-ui-debug [data-ui-core-name]::after {
  content: attr(data-ui-core-name);
  position: absolute;
  inset-block-start: -7px;
  inset-inline-start: 2px;
  font-size: 10px;
  line-height: 1;
  padding: 1px 2px;
  background: var(--ii-surface-muted);
  color: var(--ii-debug);
  border: 1px solid var(--ii-debug-border);
  pointer-events: none;
  z-index: 2;
  white-space: nowrap;
}

html.ii-ui-debug .ii-refactor-mark [data-ui-core='1'] {
  outline: 3px solid var(--ii-debug);
  outline-offset: 2px;
}

html.ii-ui-debug .ii-refactor-mark [data-ui-core-name] {
  outline: 3px solid var(--ii-debug);
  outline-offset: 2px;
}

html.ii-ui-debug .ii-refactor-mark [data-ui-core-name] {
  position: relative;
}

html.ii-ui-debug .ii-refactor-mark [data-ui-core-name]::after {
  content: attr(data-ui-core-name);
  position: absolute;
  inset-block-start: -7px;
  inset-inline-start: 2px;
  font-size: 9px;
  line-height: 1;
  padding: 1px 2px;
  background: var(--ii-surface-muted);
  color: var(--ii-debug);
  border: 1px solid var(--ii-debug-border);
  pointer-events: none;
  z-index: 2;
  white-space: nowrap;
}

.ii-appIcon {
  display: block;
}

.ii-btn {
  height: 40px;
  border-radius: var(--ii-radius-md);
  border: 1px solid var(--ii-border);
  background: transparent;
  color: var(--ii-text);
  padding: 0 12px;
  cursor: pointer;
}

.ii-btn--block {
  width: 100%;
}

.ii-btn__icon-left {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-right: 8px;
}

.ii-btn__label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.ii-btnIconRow {
  min-height: 44px;
  justify-content: flex-start;
}

.ii-btnIconRow__icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.ii-btnIconRow--active {
  box-shadow: 0 0 0 2px var(--ii-border-strong);
}

.ii-btn:focus-visible {
  outline: 2px solid color-mix(in srgb, var(--ii-accent) 55%, transparent);
  outline-offset: 1px;
}

.ii-btn[disabled] {
  opacity: 0.6;
  cursor: not-allowed;
}

.ii-btn--primary {
  background: var(--ii-primary);
  border-color: var(--ii-primary-tint);
}

.ii-btn--primary:hover {
  background: var(--ii-primary-strong);
  border-color: var(--ii-primary-tint-2);
}

.ii-btn--secondary {
  background: transparent;
  border-color: var(--ii-primary-tint-2);
  color: var(--ii-text);
}

.ii-btn--secondary:hover {
  background: var(--ii-primary-bg);
  border-color: var(--ii-primary-tint-2);
}

.ii-btn--ghost {
  background: transparent;
  border-color: transparent;
  color: var(--ii-primary-strong);
}

.ii-btn--ghost:hover {
  background: var(--ii-surface-alt-2, var(--ii-surface));
  border-color: transparent;
}

.ii-iconBtn--primary {
  color: var(--ii-primary-strong);
  opacity: 1;
  background: var(--ii-primary-bg);
  border-color: var(--ii-primary-tint);
}

.ii-iconBtn--primary:hover {
  background: var(--ii-primary-tint-2);
  border-color: var(--ii-primary-tint);
}

.ii-btn--danger {
  background: var(--ii-danger-bg);
  border-color: var(--ii-danger-border);
}

.ii-input {
  height: 40px;
  width: 100%;
  border-radius: var(--ii-input-radius, var(--ii-radius-md));
  border: 1px solid var(--ii-border-input);
  background: var(--ii-input-bg, var(--ii-surface));
  color: var(--ii-text);
  padding: 0 12px;
  box-sizing: border-box;
  transition: border-color var(--ii-motion-duration-fast) var(--ii-motion-ease-standard);
}

.ii-input:focus,
.ii-input:focus-visible {
  outline: none;
  border-color: var(--ii-border-focus);
  box-shadow: none;
}

.ii-textarea {
  width: 100%;
  min-height: 44px;
  border-radius: var(--ii-input-radius, var(--ii-radius-md));
  border: 1px solid var(--ii-border-input);
  background: var(--ii-input-bg, var(--ii-surface));
  color: var(--ii-text);
  padding: 10px 12px;
  box-sizing: border-box;
  font-family: inherit;
  font-size: 14px;
  line-height: 1.5;
  outline: none;
  resize: none;
  overflow-y: hidden;
  transition:
    border-color var(--ii-motion-duration-fast) var(--ii-motion-ease-standard),
    background var(--ii-motion-duration-fast) var(--ii-motion-ease-standard);
}

.ii-textarea:focus,
.ii-textarea:focus-visible {
  outline: none;
  border-color: var(--ii-border-focus);
  box-shadow: none;
}

.ii-jsonEditor {
  position: relative;
}

.ii-jsonEditor__actions {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 2;
}

.ii-jsonEditor .ii-textarea {
  padding-right: 44px;
}

.ii-jsonEditor__textarea--invalid.ii-textarea {
  outline: none;
  border-color: var(--ii-danger);
  box-shadow: none;
}

.ii-codeEditor {
  border-radius: 0;
  border: 0;
  background: var(--ii-surface);
  overflow: hidden;
}

.ii-codeEditor:focus-within {
  outline: 2px solid var(--ii-border-focus);
  outline-offset: 2px;
  box-shadow: none;
}

.ii-codeEditor--invalid {
  outline: 2px solid var(--ii-danger);
  outline-offset: 2px;
  box-shadow: none;
}

.ii-codeEditor--disabled {
  background: var(--ii-surface-2, var(--ii-surface));
}

.ii-codeEditor__toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  min-height: 40px;
  padding: 0 10px;
  border-bottom: 0;
  background: var(--ii-surface-2, var(--ii-surface));
}

.ii-codeEditor__toolbarLeft,
.ii-codeEditor__toolbarRight {
  display: flex;
  align-items: center;
  gap: 8px;
}

.ii-codeEditor__lang {
  font-size: 12px;
  color: var(--ii-text-muted);
}

.ii-codeEditor__body {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: stretch;
}

.ii-codeEditor__gutter {
  padding: 10px 8px;
  border-right: 0;
  background: var(--ii-surface-2, var(--ii-surface));
  color: var(--ii-text-muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.5;
  text-align: right;
  user-select: none;
  min-width: 44px;
  overflow: hidden;
}

.ii-codeEditor__gutterInner {
  will-change: transform;
}

.ii-codeEditor__line {
  height: 19.5px;
}

.ii-codeEditor__textarea {
  width: 100%;
  min-height: 220px;
  border: none;
  border-radius: 0;
  background: transparent;
  color: var(--ii-text);
  padding: 10px 12px;
  box-sizing: border-box;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.5;
  outline: none;
  resize: none;
  overflow: auto;
  tab-size: 2;
}

.ii-codeEditor--disabled .ii-codeEditor__textarea {
  color: var(--ii-text-muted);
}

.ii-textarea--invalid {
  outline: 2px solid var(--ii-danger);
  outline-offset: 2px;
  border-color: var(--ii-danger);
  box-shadow: none;
}

.ii-markdown-editor--split {
  border-radius: 0;
  border: 0;
  background: var(--ii-surface);
  overflow: hidden;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: stretch;
}

.ii-markdown-editor--split:focus-within {
  outline: 2px solid var(--ii-border-focus);
  outline-offset: 2px;
  box-shadow: none;
}

.ii-markdown-editor--invalid {
  outline: 2px solid var(--ii-danger);
  outline-offset: 2px;
  box-shadow: none;
}

.ii-markdown-editor--disabled {
  background: var(--ii-surface-2, var(--ii-surface));
}

.ii-markdown-editor__pane {
}

.ii-markdown-editor__pane + .ii-markdown-editor__pane {
  margin-top: 10px;
}

.ii-markdown-editor--split .ii-markdown-editor__pane {
  min-height: 220px;
}

.ii-markdown-editor--split .ii-markdown-editor__pane + .ii-markdown-editor__pane {
  margin-top: 0;
  border-left: 0;
  background: var(--ii-surface-2, var(--ii-surface));
}

.ii-markdown-editor--split .ii-markdown-editor__input.ii-textarea {
  height: 100%;
  min-height: 220px;
  border: none;
  border-radius: 0;
  box-shadow: none;
  background: transparent;
  padding: 10px 12px;
  overflow: auto;
}

.ii-markdown-editor--split .ii-markdown-editor__input.ii-textarea:focus {
  border: none;
  box-shadow: none;
}

.ii-markdown-editor__preview {
  padding: 10px 12px;
}

.ii-markdown-editor--split .ii-markdown-editor__preview {
  height: 100%;
  min-height: 220px;
  overflow: auto;
  background: transparent;
}

.ii-markdown-editor__previewHtml {
  color: var(--ii-text);
  font-size: 13px;
  line-height: 1.5;
}

.ii-markdown-editor__previewHtml .ii-md-gap {
  height: 10px;
}

.ii-markdown-editor__previewHtml .ii-md-h1 {
  margin: 0 0 10px 0;
  font-size: 16px;
  font-weight: 900;
}

.ii-markdown-editor__previewHtml .ii-md-h2 {
  margin: 0 0 10px 0;
  font-size: 15px;
  font-weight: 900;
}

.ii-markdown-editor__previewHtml .ii-md-h3,
.ii-markdown-editor__previewHtml .ii-md-h4,
.ii-markdown-editor__previewHtml .ii-md-h5,
.ii-markdown-editor__previewHtml .ii-md-h6 {
  margin: 0 0 10px 0;
  font-size: 14px;
  font-weight: 900;
}

.ii-markdown-editor__previewHtml .ii-md-p {
  margin: 0 0 10px 0;
}

.ii-markdown-editor__previewHtml .ii-md-p:last-child {
  margin-bottom: 0;
}

.ii-markdown-editor__previewHtml .ii-md-ul {
  margin: 0 0 10px 18px;
  padding: 0;
}

.ii-markdown-editor__previewHtml .ii-md-ul li {
  margin: 0 0 4px 0;
}

.ii-markdown-editor__previewHtml .ii-md-ul li:last-child {
  margin-bottom: 0;
}

.ii-markdown-editor__previewHtml code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
  font-size: 12px;
  background: var(--ii-surface-2, var(--ii-surface));
  padding: 1px 4px;
  border-radius: 0;
}

.ii-markdown-editor__previewText {
  white-space: pre-wrap;
  color: var(--ii-text);
  font-size: 13px;
  line-height: 1.5;
}

.ii-richTextEditor {
  border-radius: 0;
  border: 0;
  background: var(--ii-surface);
  overflow: hidden;
}

.ii-richTextEditor:focus-within {
  outline: 2px solid var(--ii-border-focus);
  outline-offset: 2px;
  box-shadow: none;
}

.ii-richTextEditor--invalid {
  outline: 2px solid var(--ii-danger);
  outline-offset: 2px;
  box-shadow: none;

  </head>
  <body>
    <div class="ii-auth">
      <div class="ii-authCard">
        <div class="ii-authSplit">
          <div class="ii-authSplit__brand">
            <div class="ii-authSplit__brandInner">
              <img
                id="brandLogo"
                class="ii-authSplit__logo"
                src="./assets/orgas/kingrt/logo.svg"
                alt="logo"
              />
            </div>
          </div>

          <div class="ii-authSplit__form">
            <form id="loginForm" class="ii-form" novalidate>
              <div>
                <label class="ii-fieldLabel" for="email">Email</label>
                <input
                  id="email"
                  class="ii-input ii-input-email"
                  type="email"
                  inputmode="email"
                  autocomplete="username"
                  aria-label="Email"
                  placeholder="name@company.com"
                />
                <div id="emailError" class="ii-fieldError" hidden></div>
              </div>

              <div>
                <label class="ii-fieldLabel" for="password">Password</label>
                <input
                  id="password"
                  class="ii-input ii-input-password"
                  type="password"
                  autocomplete="current-password"
                  aria-label="Password"
                  placeholder="••••••••••"
                />
                <div id="passwordError" class="ii-fieldError" hidden></div>
              </div>

              <button id="submitBtn" class="ii-btn ii-btn--primary ii-authBtn ii-btn--block" type="submit">
                <span class="ii-btn__label">Sign in</span>
              </button>

              <div id="authError" class="ii-error" hidden></div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const SESSION_KEY = 'ii_call_session';

        const ACCOUNT_ROWS = [
          {
            emailCodes: [97, 100, 109, 105, 110, 64, 105, 110, 116, 101, 108, 108, 105, 103, 101, 110, 116, 45, 105, 110, 116, 101, 114, 110, 46, 99, 111, 109],
            passwordCodes: [97, 100, 109, 105, 110, 49, 50, 51],
            role: 'admin',
            displayName: 'Platform Admin',
          },
          {
            emailCodes: [117, 115, 101, 114, 64, 105, 110, 116, 101, 108, 108, 105, 103, 101, 110, 116, 45, 105, 110, 116, 101, 114, 110, 46, 99, 111, 109],
            passwordCodes: [117, 115, 101, 114, 49, 50, 51],
            role: 'user',
            displayName: 'Call User',
          },
        ];

        function decodeAscii(codes) {
          return String.fromCharCode(...codes);
        }

        const ACCOUNTS = ACCOUNT_ROWS.reduce((acc, row) => {
          acc[decodeAscii(row.emailCodes)] = {
            password: decodeAscii(row.passwordCodes),
            role: row.role,
            displayName: row.displayName,
          };
          return acc;
        }, {});

        function readSession() {
          try {
            const raw = localStorage.getItem(SESSION_KEY);
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== 'object') return null;
            if (parsed.role !== 'admin' && parsed.role !== 'user') return null;
            if (typeof parsed.email !== 'string' || parsed.email.trim() === '') return null;
            return parsed;
          } catch {
            return null;
          }
        }

        function showError(node, message) {
          if (!(node instanceof HTMLElement)) return;
          if (!message) {
            node.textContent = '';
            node.hidden = true;
            return;
          }
          node.textContent = message;
          node.hidden = false;
        }

        const activeSession = readSession();
        if (activeSession?.role === 'admin') {
          window.location.replace('./admin-overview.html');
          return;
        }

        if (activeSession?.role === 'user') {
          window.location.replace('./user-calls.html');
          return;
        }

        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const authError = document.getElementById('authError');
        const submitBtn = document.getElementById('submitBtn');

        form?.addEventListener('submit', (event) => {
          event.preventDefault();

          if (!(emailInput instanceof HTMLInputElement)) return;
          if (!(passwordInput instanceof HTMLInputElement)) return;
          if (!(submitBtn instanceof HTMLButtonElement)) return;

          showError(emailError, '');
          showError(passwordError, '');
          showError(authError, '');

          emailInput.classList.remove('ii-input--invalid');
          passwordInput.classList.remove('ii-input--invalid');

          const email = emailInput.value.trim().toLowerCase();
          const password = passwordInput.value;

          let hasError = false;
          if (!email) {
            showError(emailError, 'Email is required.');
            emailInput.classList.add('ii-input--invalid');
            hasError = true;
          } else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
            showError(emailError, 'Email is invalid.');
            emailInput.classList.add('ii-input--invalid');
            hasError = true;
          }

          if (!password) {
            showError(passwordError, 'Password is required.');
            passwordInput.classList.add('ii-input--invalid');
            hasError = true;
          }

          if (hasError) return;

          submitBtn.disabled = true;

          const account = ACCOUNTS[email];
          if (!account || account.password !== password) {
            showError(authError, 'Invalid credentials.');
            submitBtn.disabled = false;
            return;
          }

          localStorage.setItem(
            SESSION_KEY,
            JSON.stringify({
              email,
              role: account.role,
              displayName: account.displayName,
              loggedInAt: Date.now(),
            }),
          );

          if (account.role === 'admin') {
            window.location.href = './admin-overview.html';
            return;
          }

          window.location.href = './user-calls.html';
        });
      })();
    </script>
  </body>
