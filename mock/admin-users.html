<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management</title>
    <link rel="stylesheet" href="./app-shell.css" />
    <style>
      .workspace.users {
        grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      }

      .toolbar.users-toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
      }

      .drawer.users-drawer {
        grid-template-columns: repeat(4, minmax(0, 1fr)) auto;
      }

      .table-wrap.users-table table {
        table-layout: fixed;
      }

      .users-table th:nth-child(1),
      .users-table td:nth-child(1) {
        width: 20%;
      }

      .users-table th:nth-child(2),
      .users-table td:nth-child(2) {
        width: 26%;
      }

      .users-table th:nth-child(3),
      .users-table td:nth-child(3) {
        width: 14%;
      }

      .users-table th:nth-child(4),
      .users-table td:nth-child(4) {
        width: 14%;
      }

      .users-table th:nth-child(5),
      .users-table td:nth-child(5) {
        width: 10%;
      }

      .users-table th:nth-child(6),
      .users-table td:nth-child(6) {
        width: 16%;
      }

      .round-icon.moderator-on {
        background: #edf3ff;
      }

      .round-icon.moderator-on:hover {
        background: #ffffff;
      }

      .round-icon.moderator-on img {
        filter: brightness(0) saturate(100%) invert(8%) sepia(26%) saturate(1004%) hue-rotate(182deg) brightness(92%)
          contrast(94%);
      }

      @media (max-width: 1280px) {
        .drawer.users-drawer {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 980px) {
        .toolbar.users-toolbar {
          grid-template-columns: 1fr;
        }

        .drawer.users-drawer {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="shell no-right-sidebar">
        <aside class="sidebar sidebar-left">
          <div class="sidebar-content left">
            <div class="brand-strip">
              <img data-brand-logo src="./assets/orgas/intelligent-intern/logo.svg" alt="Intelligent Intern" />
              <button id="hideLeftSidebarBtn" class="sidebar-toggle-btn" type="button" title="Hide sidebar" aria-label="Hide sidebar">
                <img class="arrow-icon-image" src="./assets/orgas/intelligent-intern/icons/backward.png" alt="" />
              </button>
            </div>

            <nav class="nav" aria-label="Main navigation">
              <a class="nav-link" href="./admin-overview.html">
                <img src="./assets/orgas/intelligent-intern/icons/users.png" alt="" />
                <span>Overview</span>
              </a>
              <a class="nav-link active" href="./admin-users.html">
                <img src="./assets/orgas/intelligent-intern/icons/user.png" alt="" />
                <span>User Management</span>
              </a>
              <a class="nav-link" href="./admin-calls-crud.html">
                <img src="./assets/orgas/intelligent-intern/icons/lobby.png" alt="" />
                <span>Video Calls</span>
              </a>
            </nav>

            <section class="sidebar-profile avatar-only">
              <img id="sidebarAvatar" data-sidebar-avatar class="sidebar-avatar-image" src="./assets/orgas/intelligent-intern/avatar-placeholder.svg" alt="Profile avatar" />
            </section>

            <div class="logout-wrap">
              <button id="logoutBtn" class="btn full" type="button">Log out</button>
            </div>
          </div>
        </aside>

        <section class="main">
          <div class="workspace users">
            <section class="section">
              <div class="section-head">
                <div>
                  <h1 class="title">User Management</h1>
                  <p class="subtitle">Provision call creators, moderators and support users.</p>
                </div>
                <div class="actions">
                  <button id="showLeftSidebarBtn" class="show-sidebar-overlay show-sidebar-inline show-left-sidebar-overlay" type="button" title="Show sidebar" aria-label="Show sidebar">
                    <img class="arrow-icon-image" src="./assets/orgas/intelligent-intern/icons/forward.png" alt="" />
                  </button>
                  <button id="toggleDrawer" class="btn" type="button">New user</button>
                  <button id="searchSubmitBtn" class="btn" type="button">Search</button>
                </div>
              </div>
            </section>

            <section class="toolbar users-toolbar">
              <input id="search" class="input" type="text" placeholder="Search by name or email" />
              <select id="roleFilter" class="select" aria-label="Role filter">
                <option value="all">All roles</option>
                <option value="admin">Admin</option>
                <option value="creator">Call Creator</option>
                <option value="viewer">Viewer</option>
              </select>
              <select id="regionFilter" class="select" aria-label="Region filter">
                <option value="all">All regions</option>
                <option value="eu-central-1">eu-central-1</option>
                <option value="us-east-1">us-east-1</option>
                <option value="ap-southeast-1">ap-southeast-1</option>
              </select>
            </section>

            <section id="drawer" class="drawer users-drawer" aria-label="Create user form">
              <div class="field">
                <label for="newName">Name</label>
                <input id="newName" class="input" type="text" placeholder="Jane Doe" />
              </div>
              <div class="field">
                <label for="newEmail">Email</label>
                <input id="newEmail" class="input" type="email" placeholder="jane@company.tld" />
              </div>
              <div class="field">
                <label for="newRole">Role</label>
                <select id="newRole" class="select">
                  <option>Call Creator</option>
                  <option>Admin</option>
                  <option>Viewer</option>
                </select>
              </div>
              <div class="field">
                <label for="newRegion">Region</label>
                <select id="newRegion" class="select">
                  <option>eu-central-1</option>
                  <option>us-east-1</option>
                  <option>ap-southeast-1</option>
                </select>
              </div>
              <button id="createUser" class="btn" type="button">Create</button>
            </section>

            <section class="table-wrap users-table">
              <h2 class="table-title">Directory</h2>
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Region</th>
                    <th>Calls</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="rows"></tbody>
              </table>
            </section>

            <footer class="footer">
              <div class="pagination">
                <button id="prev" class="pager-btn pager-icon-btn" type="button" title="Previous page" aria-label="Previous page">
                  <img class="pager-icon-img" src="./assets/orgas/intelligent-intern/icons/backward.png" alt="" />
                </button>
                <div id="pageInfo" class="page-info">-</div>
                <button id="next" class="pager-btn pager-icon-btn" type="button" title="Next page" aria-label="Next page">
                  <img class="pager-icon-img" src="./assets/orgas/intelligent-intern/icons/forward.png" alt="" />
                </button>
              </div>
            </footer>
          </div>
        </section>
      </div>
    </main>

    <script src="./settings-modal.js"></script>
    <script>
      (() => {
        const SESSION_KEY = 'ii_call_session';

        function initShellChrome() {
          const shell = document.querySelector('.shell');
          const leftSidebar = document.querySelector('.sidebar-left');
          const hideLeft = document.getElementById('hideLeftSidebarBtn');
          const showLeft = document.getElementById('showLeftSidebarBtn');

          function setLeftCollapsed(collapsed) {
            if (!(shell instanceof HTMLElement)) return;
            shell.classList.toggle('left-collapsed', collapsed);
            if (leftSidebar instanceof HTMLElement) {
              leftSidebar.classList.toggle('collapsed', collapsed);
            }
          }

          hideLeft?.addEventListener('click', () => setLeftCollapsed(true));
          showLeft?.addEventListener('click', () => setLeftCollapsed(false));

          if (window.matchMedia('(max-width: 980px)').matches) {
            setLeftCollapsed(true);
          }
        }

        function readSession() {
          try {
            const raw = localStorage.getItem(SESSION_KEY);
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== 'object') return null;
            if (parsed.role !== 'admin' && parsed.role !== 'user') return null;
            if (typeof parsed.email !== 'string' || parsed.email.trim() === '') return null;
            return parsed;
          } catch {
            return null;
          }
        }

        const session = readSession();
        if (!session) {
          window.location.replace('./login.html');
          return;
        }

        if (session.role !== 'admin') {
          window.location.replace('./user-calls.html');
          return;
        }

        const logoutBtn = document.getElementById('logoutBtn');
        logoutBtn?.addEventListener('click', () => {
          localStorage.removeItem(SESSION_KEY);
          window.location.href = './login.html';
        });

        const users = Array.from({ length: 38 }).map((_, index) => ({
          id: index + 1,
          name: `User ${String(index + 1).padStart(2, '0')}`,
          email: `user${index + 1}@company.tld`,
          role: index % 9 === 0 ? 'Admin' : index % 7 === 0 ? 'Viewer' : 'Call Creator',
          region: index % 3 === 0 ? 'eu-central-1' : index % 3 === 1 ? 'us-east-1' : 'ap-southeast-1',
          calls: Math.floor(Math.random() * 16),
        }));

        const rows = document.getElementById('rows');
        const pageInfo = document.getElementById('pageInfo');
        const prev = document.getElementById('prev');
        const next = document.getElementById('next');
        const searchInput = document.getElementById('search');
        const roleFilter = document.getElementById('roleFilter');
        const regionFilter = document.getElementById('regionFilter');

        const drawer = document.getElementById('drawer');
        const toggleDrawer = document.getElementById('toggleDrawer');
        const createUser = document.getElementById('createUser');
        const searchSubmitBtn = document.getElementById('searchSubmitBtn');
        const newName = document.getElementById('newName');
        const newEmail = document.getElementById('newEmail');
        const newRole = document.getElementById('newRole');
        const newRegion = document.getElementById('newRegion');

        const cardTotalUsers = document.getElementById('cardTotalUsers');
        const cardFilteredUsers = document.getElementById('cardFilteredUsers');
        const cardAdminUsers = document.getElementById('cardAdminUsers');

        const pageSize = 10;
        let page = 1;
        let search = '';

        function normalizeRoleFilter(value) {
          if (value === 'admin') return 'Admin';
          if (value === 'creator') return 'Call Creator';
          if (value === 'viewer') return 'Viewer';
          return 'all';
        }

        function filteredUsers() {
          const query = search.trim().toLowerCase();
          const roleSelected = roleFilter instanceof HTMLSelectElement ? normalizeRoleFilter(roleFilter.value) : 'all';
          const regionSelected = regionFilter instanceof HTMLSelectElement ? regionFilter.value : 'all';

          return users.filter((user) => {
            if (roleSelected !== 'all' && user.role !== roleSelected) return false;
            if (regionSelected !== 'all' && user.region !== regionSelected) return false;
            if (!query) return true;
            return user.name.toLowerCase().includes(query) || user.email.toLowerCase().includes(query);
          });
        }

        function updateCards(filteredCount) {
          if (cardTotalUsers instanceof HTMLElement) {
            cardTotalUsers.textContent = `Total users: ${users.length}`;
          }
          if (cardFilteredUsers instanceof HTMLElement) {
            cardFilteredUsers.textContent = `Filtered users: ${filteredCount}`;
          }
          if (cardAdminUsers instanceof HTMLElement) {
            cardAdminUsers.textContent = `Admins: ${users.filter((u) => u.role === 'Admin').length}`;
          }
        }

        function render() {
          if (!(rows instanceof HTMLElement)) return;
          if (!(pageInfo instanceof HTMLElement)) return;
          if (!(prev instanceof HTMLButtonElement)) return;
          if (!(next instanceof HTMLButtonElement)) return;

          const list = filteredUsers();
          const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
          if (page > totalPages) page = totalPages;

          const start = (page - 1) * pageSize;
          const current = list.slice(start, start + pageSize);

          rows.innerHTML = current
            .map((user) => {
              const adminIcon = user.role === 'Admin' ? 'adminon.png' : 'adminoff.png';
              const moderatorClass = user.role === 'Admin' ? ' moderator-on' : '';
              return `
                <tr>
                  <td>${user.name}</td>
                  <td>${user.email}</td>
                  <td>${user.role}</td>
                  <td>${user.region}</td>
                  <td>${user.calls}</td>
                  <td>
                    <span class="actions-inline">
                      <button class="round-icon${moderatorClass}" data-action="promote" data-id="${user.id}" title="Toggle moderator role">
                        <img src="./assets/orgas/intelligent-intern/icons/${adminIcon}" alt="" />
                      </button>
                      <button class="round-icon" data-action="remove" data-id="${user.id}" title="Remove user">
                        <img src="./assets/orgas/intelligent-intern/icons/remove_user.png" alt="" />
                      </button>
                    </span>
                  </td>
                </tr>
              `;
            })
            .join('');

          pageInfo.textContent = `Page ${page}/${totalPages} • ${list.length} users`;
          prev.disabled = page <= 1;
          next.disabled = page >= totalPages;
          updateCards(list.length);
        }

        rows?.addEventListener('click', (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) return;

          const button = target.closest('button[data-action]');
          if (!(button instanceof HTMLButtonElement)) return;

          const id = Number(button.dataset.id);
          const action = button.dataset.action;
          const index = users.findIndex((entry) => entry.id === id);
          if (index < 0) return;

          if (action === 'promote') {
            users[index].role = users[index].role === 'Admin' ? 'Call Creator' : 'Admin';
          } else if (action === 'remove') {
            users.splice(index, 1);
          }

          render();
        });

        prev?.addEventListener('click', () => {
          if (page > 1) {
            page -= 1;
            render();
          }
        });

        next?.addEventListener('click', () => {
          const totalPages = Math.max(1, Math.ceil(filteredUsers().length / pageSize));
          if (page < totalPages) {
            page += 1;
            render();
          }
        });

        searchInput?.addEventListener('input', () => {
          if (!(searchInput instanceof HTMLInputElement)) return;
          search = searchInput.value;
          page = 1;
          render();
        });

        roleFilter?.addEventListener('change', () => {
          page = 1;
          render();
        });

        regionFilter?.addEventListener('change', () => {
          page = 1;
          render();
        });

        toggleDrawer?.addEventListener('click', () => {
          drawer?.classList.toggle('open');
        });

        createUser?.addEventListener('click', () => {
          if (!(newName instanceof HTMLInputElement)) return;
          if (!(newEmail instanceof HTMLInputElement)) return;
          if (!(newRole instanceof HTMLSelectElement)) return;
          if (!(newRegion instanceof HTMLSelectElement)) return;

          const name = newName.value.trim();
          const email = newEmail.value.trim();
          if (name === '' || email === '') return;

          users.unshift({
            id: users.reduce((max, item) => Math.max(max, item.id), 0) + 1,
            name,
            email,
            role: newRole.value,
            region: newRegion.value,
            calls: 0,
          });

          newName.value = '';
          newEmail.value = '';
          drawer?.classList.remove('open');
          page = 1;
          render();
        });

        searchSubmitBtn?.addEventListener('click', () => {
          page = 1;
          render();
        });

        if (window.KingSettingsUI && typeof window.KingSettingsUI.init === 'function') {
          window.KingSettingsUI.init({
            role: session.role,
            displayName: session.displayName || 'Admin',
            email: session.email,
          });
        }

        initShellChrome();
        render();
      })();
    </script>
  </body>
</html>
