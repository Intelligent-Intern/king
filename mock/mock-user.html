<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Shell</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bg-shell: #071329;
        --bg-sidebar: #091a35;
        --bg-main: #091a35;
        --bg-video: #133262;
        --video-bg-blur: 0px;
        --video-bg-scale: 1;
        --bg-strip: #091a35;
        --bg-mini-video: #25569a;
        --bg-surface: #112b55;
        --bg-surface-strong: #153665;
        --bg-tab: #1c437a;
        --bg-tab-hover: #2a5aa0;
        --bg-tab-active: #3f79d6;
        --bg-control: #1b427a;
        --bg-control-active: #3f79d6;
        --bg-reaction-tray: #122d59;
        --bg-reaction-btn: #21508f;
        --bg-reaction-btn-hover: #2e65b3;
        --bg-input: #0c1f41;
        --bg-row-hover: #15305a;
        --bg-row-pinned: #2d63b3;
        --bg-preview: #2b63ac;
        --bg-icon: #1a3f74;
        --bg-icon-active: #2f68ba;
        --bg-icon-remove: #451b27;
        --bg-icon-admit: #1a4c37;
        --bg-overlay-btn: #1a3f74;
        --bg-overlay-btn-hover: #2f68ba;
        --border-subtle: #24497f;
        --text-primary: #edf3ff;
        --text-secondary: #c0d1ef;
        --text-muted: #94add3;
        --text-dim: #7f9cc8;
        --danger: #ff0000;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg-shell);
        color: var(--text-primary);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: #1a3f74 #0b1f42;
      }

      *::-webkit-scrollbar {
        width: 3px;
        height: 3px;
      }

      *::-webkit-scrollbar-track {
        background: #0b1f42;
      }

      *::-webkit-scrollbar-thumb {
        background: #1a3f74;
        border-radius: 999px;
      }

      *::-webkit-scrollbar-thumb:hover {
        background: #2f68ba;
      }

      .app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .shell {
        --left-col: 290px;
        --right-col: 390px;
        --main-lift: 100px;
        --main-bottom-offset: 0px;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: var(--left-col) minmax(0, 1fr) var(--right-col);
        background: var(--bg-shell);
        overflow: hidden;
        transition: grid-template-columns 240ms ease;
      }

      .shell.right-collapsed {
        --right-col: 0px;
      }

      .shell.left-collapsed {
        --left-col: 0px;
      }

      .sidebar-left,
      .sidebar-right {
        background: var(--bg-shell);
        min-height: 0;
      }

      .main {
        background: var(--bg-shell);
        display: grid;
        grid-template-rows: minmax(0, 1fr) 170px auto;
        min-height: 0;
        margin-top: calc(-1 * var(--main-lift));
        margin-bottom: var(--main-bottom-offset);
        padding-top: calc(var(--main-lift) + 10px);
        position: relative;
      }

      .show-sidebar-overlay {
        position: fixed;
        top: 16px;
        width: 36px;
        height: 36px;
        border: 0;
        border-radius: 50%;
        background: var(--bg-overlay-btn);
        color: var(--text-primary);
        display: grid;
        place-items: center;
        z-index: 6;
        cursor: pointer;
        visibility: hidden;
        transform: translateX(8px);
        transition: transform 240ms ease, background 180ms ease, visibility 0s linear 240ms;
        pointer-events: none;
      }

      .show-sidebar-overlay:hover {
        background: var(--bg-overlay-btn-hover);
      }

      .show-right-sidebar-overlay {
        right: 16px;
        transform: translateX(8px);
      }

      .show-left-sidebar-overlay {
        left: 16px;
        transform: translateX(-8px);
      }

      .shell.right-collapsed .show-right-sidebar-overlay {
        visibility: visible;
        transform: translateX(0);
        transition: transform 240ms ease, background 180ms ease;
        pointer-events: auto;
      }

      .shell.left-collapsed .show-left-sidebar-overlay {
        visibility: visible;
        transform: translateX(0);
        transition: transform 240ms ease, background 180ms ease;
        pointer-events: auto;
      }

      .icon-arrow {
        width: 18px;
        height: 18px;
        display: block;
      }

      .icon-arrow path {
        stroke: currentColor;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .arrow-icon-image {
        width: 18px;
        height: 18px;
        object-fit: contain;
        display: block;
        filter: brightness(0) invert(1);
      }

      .video-primary {
        background: var(--bg-video);
        margin: 0 1px 1px;
        display: grid;
        place-items: center;
        color: var(--text-primary);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace;
        font-size: 20px;
        letter-spacing: 0.04em;
        position: relative;
        overflow: hidden;
      }

      .video-primary::before {
        content: '';
        position: absolute;
        inset: 0;
        background: #133262;
        filter: blur(var(--video-bg-blur));
        transform: scale(var(--video-bg-scale));
        transform-origin: center;
        pointer-events: none;
        z-index: 0;
      }

      .main-video-label {
        pointer-events: none;
        position: relative;
        z-index: 2;
      }

      .emoji-flight-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 1;
      }

      .emoji-particle {
        position: absolute;
        left: 0;
        top: 0;
        font-size: 28px;
        line-height: 1;
        will-change: transform, opacity;
        user-select: none;
      }

      .video-strip {
        --strip-cols: 1;
        background: var(--bg-strip);
        margin: 1px;
        gap: 1px;
        display: grid;
        grid-template-columns: repeat(var(--strip-cols), minmax(0, 1fr));
        grid-auto-rows: minmax(0, 1fr);
        min-height: 0;
      }

      .mini-video {
        background: var(--bg-mini-video);
        display: grid;
        place-items: center;
        color: var(--text-secondary);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace;
        font-size: 12px;
        overflow: hidden;
      }

      .mini-video.hidden {
        display: none;
      }

      .call-controls {
        background: transparent;
        margin-top: 10px;
        padding: 0 14px 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        position: relative;
        overflow: visible;
      }

      .reaction-tray {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translate(-50%, 12px);
        background: var(--bg-reaction-tray);
        border-radius: 10px;
        padding: 6px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        z-index: 8;
        white-space: nowrap;
        visibility: hidden;
        pointer-events: none;
        transition: transform 220ms ease, visibility 0s linear 220ms;
      }

      .reaction-tray.open {
        visibility: visible;
        pointer-events: auto;
        transform: translate(-50%, 0);
        transition: transform 220ms ease;
      }

      .reaction-emoji-btn {
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 9px;
        background: var(--bg-reaction-btn);
        color: var(--text-primary);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
      }

      .reaction-emoji-btn:hover {
        background: var(--bg-reaction-btn-hover);
      }

      .call-control-btn {
        width: 44px;
        height: 44px;
        border: 0;
        background: var(--bg-control);
        color: #ffffff;
        border-radius: 12px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
      }

      .call-control-btn .ctrl-icon {
        font-size: 18px;
        line-height: 1;
      }

      .ctrl-svg {
        width: 22px;
        height: 22px;
        display: block;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .ctrl-icon-image {
        width: 20px;
        height: 20px;
        object-fit: contain;
        display: block;
        filter: brightness(0) invert(1);
      }

      .ctrl-svg .off-slash {
        display: none;
      }

      .call-control-btn.is-off .ctrl-svg .off-slash {
        display: block;
      }

      .call-control-btn.active {
        background: var(--bg-control-active);
        color: #ffffff;
      }

      .call-control-btn.hangup {
        background: var(--danger);
        color: #ffffff;
        width: 88px;
        border: 0;
        outline: none;
        box-shadow: none;
        text-shadow: none;
        filter: none;
      }

      .call-control-btn.hangup:focus,
      .call-control-btn.hangup:focus-visible,
      .call-control-btn.hangup:active {
        outline: none;
        box-shadow: none;
      }

      .hangup-icon {
        width: 30px;
        height: 30px;
        display: block;
        fill: #ffffff;
      }

      .sidebar-right {
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        min-width: 0;
        overflow: auto;
        visibility: visible;
        transform: translateX(0);
        transition: transform 240ms ease, visibility 0s linear 0s;
      }

      .sidebar-right.collapsed {
        visibility: hidden;
        transform: translateX(24px);
        transition: transform 240ms ease, visibility 0s linear 240ms;
        pointer-events: none;
      }

      .sidebar-left {
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        min-width: 0;
        overflow: auto;
        visibility: visible;
        transform: translateX(0);
        transition: transform 240ms ease, visibility 0s linear 0s;
      }

      .sidebar-left.collapsed {
        visibility: hidden;
        transform: translateX(-24px);
        transition: transform 240ms ease, visibility 0s linear 240ms;
        pointer-events: none;
      }

      .sidebar-content {
        background: var(--bg-sidebar);
        margin: 10px 10px 200px 10px;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: auto;
        border-radius: 5px;
      }

      .sidebar-content-left {
        grid-template-rows: auto auto minmax(0, 1fr);
        align-content: start;
        margin: 10px 10px 200px 10px;
      }

      .sidebar-content-left .brand-widget--sidebar {
        grid-row: 1;
      }

      .sidebar-content-left .tabs-left {
        grid-row: 2;
      }

      .sidebar-content-left .tab-panel {
        grid-row: 3;
        min-height: 0;
      }

      .brand-widget {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand-widget--sidebar {
        width: 100%;
        height: 70px;
        overflow: visible;
        position: relative;
        z-index: 2;
      }

      .sidenav-logo-btn {
        margin: 0;
        width: 100%;
        height: 70px;
        padding: 0 20px;
        box-sizing: border-box;
        border: 0;
        background: #0b2d4a;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--text-primary);
        cursor: pointer;
      }

      .sidenav-logo-btn:hover {
        background: #114066;
      }

      .sidenav-logo {
        height: auto;
        max-height: 40px;
        width: auto;
      }

      .sidenav-icon {
        width: 46px;
        height: 46px;
        display: none;
      }

      .sidenav-expand-hint {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .tabs {
        display: grid;
        background: var(--bg-surface-strong);
      }

      .tabs.tabs-left {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .tabs.tabs-right {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr) 54px;
      }

      .tab {
        height: 48px;
        border: 0;
        background: var(--bg-tab);
        color: var(--text-secondary);
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: background 160ms ease, color 160ms ease;
      }

      .tab-icon {
        width: 18px;
        height: 18px;
        object-fit: contain;
        display: block;
        margin: 0 auto;
        filter: brightness(0) invert(1);
      }

      .tab-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .tab-label .tab-icon {
        width: 16px;
        height: 16px;
        margin: 0;
      }

      .tab.active {
        cursor: default;
      }

      .tab:hover {
        background: var(--bg-tab-hover);
        color: var(--text-primary);
      }

      .tab.active {
        background: var(--bg-tab-active);
        color: #ffffff;
      }

      .tab.tab-toggle {
        display: grid;
        place-items: center;
        padding: 0;
        background: var(--bg-tab);
      }

      .tab.tab-toggle:hover {
        background: var(--bg-tab-hover);
      }

      .tab-panel {
        display: none;
        min-height: 0;
      }

      .tab-panel.active {
        display: grid;
      }

      .panel-settings.active {
        grid-template-rows: minmax(0, 1fr);
      }

      .panel-users.active {
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .panel-lobby.active {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .panel-chat.active {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
      }

      .toolbar {
        padding: 10px;
        border-top: 1px solid var(--border-subtle);
        border-bottom: 1px solid var(--border-subtle);
      }

      .search {
        width: 100%;
        height: 38px;
        border: 0;
        background: var(--bg-input);
        color: var(--text-primary);
        padding: 0 10px;
      }

      .search::placeholder {
        color: var(--text-dim);
      }

      .user-list {
        overflow: auto;
        min-height: 0;
      }

      .lobby-list {
        overflow: auto;
        min-height: 0;
      }

      .lobby-toolbar {
        padding: 10px;
        border-top: 1px solid var(--border-subtle);
        border-bottom: 1px solid var(--border-subtle);
      }

      .lobby-toolbar .pager-btn {
        height: 38px;
      }

      .settings-panel,
      .background-panel {
        padding: 12px;
        display: grid;
        gap: 10px;
        align-content: start;
        min-height: 0;
        overflow: auto;
      }

      .settings-section {
        background: var(--bg-surface-strong);
        border-radius: 6px;
        padding: 10px;
        display: grid;
        gap: 8px;
      }

      .settings-title {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--text-primary);
      }

      .settings-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .settings-label {
        font-size: 12px;
        color: var(--text-muted);
      }

      .settings-field {
        display: grid;
        gap: 6px;
      }

      .settings-select {
        width: 100%;
        height: 34px;
        border: 0;
        border-radius: 6px;
        background: var(--bg-input);
        color: var(--text-primary);
        padding: 0 10px;
      }

      .settings-value {
        font-size: 12px;
        color: var(--text-dim);
      }

      .bg-option {
        border: 0;
        border-radius: 6px;
        padding: 10px 12px;
        text-align: left;
        background: var(--bg-tab);
        color: var(--text-secondary);
        cursor: pointer;
        font-weight: 600;
      }

      .bg-option:hover {
        background: var(--bg-tab-hover);
        color: var(--text-primary);
      }

      .bg-option.active {
        background: var(--bg-tab-active);
        color: #ffffff;
      }

      .user-row {
        border-bottom: 1px solid var(--border-subtle);
        padding: 10px;
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }

      .user-row.restricted {
        grid-template-columns: 72px minmax(0, 1fr);
      }

      .user-row:hover {
        background: var(--bg-row-hover);
      }

      .user-row.pinned {
        background: var(--bg-row-pinned);
      }

      .user-row.pinned .user-name {
        color: #ffffff;
      }

      .user-row.pinned .user-meta {
        color: var(--text-primary);
      }

      .user-preview {
        width: 72px;
        height: 40px;
        background: var(--bg-preview);
        border: 0;
        display: grid;
        place-items: center;
        font-size: 11px;
        color: var(--text-secondary);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace;
      }

      .user-copy {
        min-width: 0;
      }

      .user-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .user-meta {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .user-actions {
        display: inline-flex;
        gap: 6px;
      }

      .round-icon {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 0;
        background: var(--bg-icon);
        color: var(--text-secondary);
        display: grid;
        place-items: center;
        font-size: 14px;
      }

      .round-icon-img {
        width: 15px;
        height: 15px;
        object-fit: contain;
        display: block;
        filter: brightness(0) invert(1);
      }

      .round-icon.active {
        background: var(--bg-icon-active);
        color: #ffffff;
      }

      .round-icon.remove {
        color: #ffffff;
        background: var(--bg-icon);
      }

      .round-icon.admit {
        color: #ffffff;
        background: var(--bg-icon);
      }

      .pagination {
        padding: 10px;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
      }

      .pager-btn {
        height: 34px;
        border: 0;
        background: transparent;
        color: var(--text-primary);
        padding: 0 10px;
        cursor: pointer;
      }

      .pager-icon-btn {
        width: 34px;
        padding: 0;
        display: grid;
        place-items: center;
      }

      .pager-btn:disabled {
        background: transparent;
        color: #6f86b0;
        opacity: 0.55;
        cursor: not-allowed;
      }

      .pager-btn:not(:disabled):hover {
        background: transparent;
        color: #ffffff;
      }

      .btn-icon-inline {
        width: 14px;
        height: 14px;
        object-fit: contain;
        vertical-align: middle;
        margin-right: 6px;
        filter: brightness(0) invert(1);
      }

      .page-info {
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-list {
        overflow: auto;
        min-height: 0;
        padding: 10px;
        display: grid;
        gap: 8px;
        align-content: start;
      }

      .chat-item {
        background: var(--bg-surface-strong);
        border-radius: 6px;
        padding: 8px 10px;
        display: grid;
        gap: 4px;
      }

      .chat-item.self {
        background: var(--bg-tab);
      }

      .chat-author {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .chat-text {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.35;
        word-break: break-word;
      }

      .chat-compose {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        padding: 10px;
      }

      .chat-input {
        min-width: 0;
      }

      .chat-send-btn {
        width: 42px;
        padding: 0;
        display: grid;
        place-items: center;
      }

      .chat-send-icon {
        width: 18px;
        height: 18px;
        object-fit: contain;
        display: block;
      }

      @media (max-width: 1440px) {
        .shell {
          --left-col: 230px;
          --right-col: 330px;
        }
      }

      @media (max-width: 1180px) {
        .shell {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr);
          position: relative;
        }

        .main {
          grid-column: 1;
          grid-row: 1;
          grid-template-rows: minmax(0, 1fr) 120px auto;
        }

        .sidebar-left,
        .sidebar-right {
          position: fixed;
          top: 0;
          bottom: 0;
          width: min(360px, 92vw);
          z-index: 9;
          transition: transform 240ms ease, visibility 0s linear 0s;
        }

        .sidebar-left {
          left: 0;
        }

        .sidebar-right {
          right: 0;
        }

        .sidebar-left.collapsed {
          visibility: hidden;
          transform: translateX(-100%);
          transition: transform 240ms ease, visibility 0s linear 240ms;
          pointer-events: none;
        }

        .sidebar-right.collapsed {
          visibility: hidden;
          transform: translateX(100%);
          transition: transform 240ms ease, visibility 0s linear 240ms;
          pointer-events: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="shell">
        <aside class="sidebar-left" aria-label="Left sidebar">
          <div class="sidebar-content sidebar-content-left">
            <div class="brand-widget brand-widget--sidebar" aria-label="Brand">
              <button
                id="hideLeftSidebar"
                class="sidenav-logo-btn"
                type="button"
                title="Hide sidebar"
                aria-label="Brand navigation"
              >
                <img class="sidenav-logo" src="./assets/orgas/kingrt/logo.svg" alt="logo" />

        const SESSION_KEY = 'ii_call_session';

            const parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== 'object') return null;
            if (parsed.role !== 'admin' && parsed.role !== 'user') return null;
            if (typeof parsed.email !== 'string' || parsed.email.trim() === '') return null;
            return parsed;
          } catch {
            return null;
          }
        }

        const shell = document.querySelector('.shell');

        const reactionTray = document.getElementById('reactionTray');

        const lobbyPanel = document.querySelector('.tab-panel[data-panel-group="right"][data-panel="lobby"]');

        function roleRank(user) {
          if (user.isAdmin) return 0;
          if (user.mod) return 1;
          return 2;
        }

        function sortUsers(list) {
          return [...list].sort((a, b) => {
            const rankDiff = roleRank(a) - roleRank(b);
            if (rankDiff !== 0) return rankDiff;
            return a.name.localeCompare(b.name, 'en', { sensitivity: 'base' });
          });
        }

        function filteredUsers() {
          const q = searchTerm.trim().toLowerCase();
          const matches = users.filter((user) => !user.removed && user.name.toLowerCase().includes(q));
          return sortUsers(matches);
        }

        function filteredLobbyUsers() {
          return [...lobbyWaiting]
            .filter((entry) => !entry.removed)
            .sort((a, b) => a.name.localeCompare(b.name, 'en', { sensitivity: 'base' }));
        }

        function nextUserId() {
          return users.reduce((maxId, user) => Math.max(maxId, user.id), 0) + 1;
        }

        function admitLobbyEntry(entry) {
          if (!entry || entry.removed) return false;
          entry.removed = true;

          const existing = users.find((user) => !user.removed && user.name === entry.name);
          if (!existing) {
            users.push({
              id: nextUserId(),
              name: entry.name,
              isAdmin: false,
              muted: false,
              mod: false,
              removed: false,
            });
          }

          return true;
        }

        function initials(name) {
          return name
            .split(' ')
            .filter(Boolean)
            .slice(0, 2)
            .map((part) => part[0].toUpperCase())

        }

        function setRightSidebarCollapsed(collapsed) {

            icon.textContent = active ? onIcon : offIcon;
          }

          button.setAttribute('aria-label', text);
        }

          controlCamera.classList.toggle('is-off', !cameraOn);
          if (controlCameraIcon instanceof HTMLImageElement) {
            controlCameraIcon.src = cameraOn
              ? './assets/orgas/kingrt/icons/camon.png'
              : './assets/orgas/kingrt/icons/cameraoff.png';
          }
          controlCamera.title = cameraOn ? 'Camera on' : 'Camera off';
          controlCamera.setAttribute('aria-label', cameraOn ? 'Camera on' : 'Camera off');

          controlMic.classList.toggle('active', micOn);
          controlMic.classList.toggle('is-off', !micOn);
          if (controlMicIcon instanceof HTMLImageElement) {
            controlMicIcon.src = micOn
              ? './assets/orgas/kingrt/icons/micon.png'
              : './assets/orgas/kingrt/icons/micoff.png';
          }

          controlShare.classList.toggle('active', sharingScreen);
          controlShare.title = sharingScreen ? 'Sharing active' : 'Share screen';
          controlShare.setAttribute('aria-label', sharingScreen ? 'Sharing active' : 'Share screen');
        }

        function renderSettingsPanel() {
          if (settingsCameraSelect instanceof HTMLSelectElement && settingsCameraValue instanceof HTMLElement) {
            const cameraLabel = settingsCameraSelect.selectedOptions[0]?.textContent?.trim() || 'Unknown';

              : `Active: ${cameraLabel} (camera off)`;
          }

          if (settingsMicSelect instanceof HTMLSelectElement && settingsMicValue instanceof HTMLElement) {

        function escapeHtml(value) {
          return value
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
        }

        function renderChat() {
          if (!(chatList instanceof HTMLElement)) {
            return;
          }

          chatList.innerHTML = chatMessages
            .map((item) => `
              <article class="chat-item${item.self ? ' self' : ''}">
                <div class="chat-author">${escapeHtml(item.author)}</div>
                <div class="chat-text">${escapeHtml(item.text)}</div>
              </article>
            `)
            .join('');

          chatList.scrollTop = chatList.scrollHeight;
        }

        function activateTab(button) {
          const group = button.dataset.tabGroup || 'default';
          const groupTabs = tabButtons.filter((entry) => (entry.dataset.tabGroup || 'default') === group);
          const groupPanels = Array.from(document.querySelectorAll(`.tab-panel[data-panel-group="${group}"]`));

          groupTabs.forEach((entry) => {
            const active = entry === button;
            entry.classList.toggle('active', active);
            entry.setAttribute('aria-selected', active ? 'true' : 'false');
          });

          groupPanels.forEach((panel) => {
            panel.classList.toggle('active', panel.dataset.panel === button.dataset.tab);
          });
        }

        function setReactionTrayOpen(open) {
          reactionTrayOpen = open;
          reactionTray.classList.toggle('open', open);
          controlReactions.classList.toggle('active', open);
        }

        function emitReactionParticle(emoji) {
          if (!(emojiFlightLayer instanceof HTMLElement) || !(mainVideo instanceof HTMLElement)) {
            return;
          }

          const layerRect = emojiFlightLayer.getBoundingClientRect();
          if (layerRect.width <= 0 || layerRect.height <= 0) {
            return;
          }

          const startX = (layerRect.width * (0.08 + Math.random() * 0.25));
          const startY = layerRect.height - (16 + Math.random() * 14);
          const rise = layerRect.height * (0.58 + Math.random() * 0.24);
          const amplitude = 14 + Math.random() * 22;
          const oscillations = 1.2 + Math.random() * 1.1;
          const drift = -8 + Math.random() * 16;
          const duration = 1700 + Math.random() * 900;

          const particle = document.createElement('span');
          particle.className = 'emoji-particle';
          particle.textContent = emoji;
          emojiFlightLayer.appendChild(particle);

          const start = performance.now();

          const tick = (now) => {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 2.1);
            const x = startX + (amplitude * Math.sin(t * Math.PI * oscillations)) + (drift * t);
            const y = startY - (rise * eased);
            const scale = 0.92 + (0.34 * (1 - t));
            const opacity = Math.max(0, 1 - Math.pow(t, 1.35));

            particle.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
            particle.style.opacity = String(opacity);

            if (t < 1) {
              requestAnimationFrame(tick);
            } else {
              particle.remove();
            }
          };

          requestAnimationFrame(tick);
        }

        function resolvePinnedUser() {
          if (pinnedUserId === null) return null;
          const pinned = users.find((user) => user.id === pinnedUserId && !user.removed) || null;
          if (!pinned) {
            pinnedUserId = null;
          }
          return pinned;
        }

        function renderMainVideo() {
          const pinned = resolvePinnedUser();
          if (!pinned) {
            mainVideoLabel.textContent = 'MAIN VIDEO';
            return;
          }

          mainVideoLabel.textContent = `PINNED • ${pinned.name}`;
        }

        function renderStrip() {
          const activeUsers = users.filter((user) => !user.removed && user.id !== pinnedUserId);

          videoStrip.innerHTML = activeUsers
            .map((user, idx) => (
              `<div class="mini-video" data-user-id="${user.id}" data-index="${idx}">${initials(user.name)}</div>`
            ))
            .join('');

          applyStripCapacity();
        }

        function applyStripCapacity() {
          const width = videoStrip.clientWidth;
          const perRow = Math.max(1, Math.floor(width / 250));
          const visibleCount = perRow;
          const tiles = Array.from(videoStrip.querySelectorAll('.mini-video'));

          videoStrip.style.setProperty('--strip-cols', String(perRow));

          tiles.forEach((tile, index) => {
            const hidden = index >= visibleCount;
            tile.classList.toggle('hidden', hidden);
          });
        }

        function renderUsers() {
          const all = filteredUsers();
          const totalPages = Math.max(1, Math.ceil(all.length / pageSize));

          if (currentPage > totalPages) {
            currentPage = totalPages;
          }

          const start = (currentPage - 1) * pageSize;
          const pageUsers = all.slice(start, start + pageSize);

          userList.innerHTML = pageUsers.map((user) => {
            const pinnedClass = pinnedUserId === user.id ? ' pinned' : '';
            const userActionsHtml = isRestrictedUser
              ? ''
              : (() => {
                  const muteIcon = user.muted
                    ? './assets/orgas/kingrt/icons/micoff.png'
                    : './assets/orgas/kingrt/icons/micon.png';
                  const modIcon = user.mod
                    ? './assets/orgas/kingrt/icons/adminon.png'
                    : './assets/orgas/kingrt/icons/adminoff.png';
                  return `
                    <div class="user-actions">
                      <button class="round-icon ${user.muted ? 'active' : ''}" type="button" data-action="mute" title="Mute">
                        <img class="round-icon-img" src="${muteIcon}" alt="" aria-hidden="true" />
                      </button>
                      <button class="round-icon ${user.mod ? 'active' : ''}" type="button" data-action="mod" title="Toggle moderator" ${user.isAdmin ? 'disabled' : ''}>
                        <img class="round-icon-img" src="${modIcon}" alt="" aria-hidden="true" />
                      </button>
                      <button class="round-icon remove" type="button" data-action="remove" title="Remove">
                        <img class="round-icon-img" src="./assets/orgas/kingrt/icons/remove_user.png" alt="" aria-hidden="true" />
                      </button>
                    </div>
                  `;
                })();

            return `
              <div class="user-row${pinnedClass}${isRestrictedUser ? ' restricted' : ''}" data-id="${user.id}">
                <div class="user-preview">${initials(user.name)}</div>
                <div class="user-copy">
                  <div class="user-name">${user.name}</div>
                </div>
                ${userActionsHtml}
              </div>
            `;
          }).join('');

          pageInfo.textContent = `Page ${currentPage}/${totalPages} • ${all.length} users`;
          prevPage.disabled = currentPage <= 1;
          nextPage.disabled = currentPage >= totalPages;
        }

        function renderLobby() {
          if (isRestrictedUser) {
            if (lobbyList instanceof HTMLElement) {
              lobbyList.innerHTML = '';
            }
            if (lobbyPageInfo instanceof HTMLElement) {
              lobbyPageInfo.textContent = 'No lobby access';
            }
            if (admitAllLobby instanceof HTMLButtonElement) admitAllLobby.disabled = true;
            if (lobbyPrevPage instanceof HTMLButtonElement) lobbyPrevPage.disabled = true;
            if (lobbyNextPage instanceof HTMLButtonElement) lobbyNextPage.disabled = true;
            return;
          }

          const all = filteredLobbyUsers();
          const totalPages = Math.max(1, Math.ceil(all.length / lobbyPageSize));

          if (lobbyCurrentPage > totalPages) {
            lobbyCurrentPage = totalPages;
          }

          const start = (lobbyCurrentPage - 1) * lobbyPageSize;
          const pageLobby = all.slice(start, start + lobbyPageSize);

          lobbyList.innerHTML = pageLobby.map((entry) => `
            <div class="user-row" data-lobby-id="${entry.id}">
              <div class="user-preview">${initials(entry.name)}</div>
              <div class="user-copy">
                <div class="user-name">${entry.name}</div>
                <div class="user-meta">lobby • waiting</div>
              </div>
              <div class="user-actions">
                <button class="round-icon remove" type="button" data-lobby-action="remove" title="Remove">
                  <img class="round-icon-img" src="./assets/orgas/kingrt/icons/remove_user.png" alt="" aria-hidden="true" />
                </button>
                <button class="round-icon admit" type="button" data-lobby-action="admit" title="Admit to call">
                  <img class="round-icon-img" src="./assets/orgas/kingrt/icons/add_to_call.png" alt="" aria-hidden="true" />
                </button>
              </div>
            </div>
          `).join('');

          lobbyPageInfo.textContent = `Page ${lobbyCurrentPage}/${totalPages} • ${all.length} in lobby`;
          admitAllLobby.disabled = all.length === 0;
          lobbyPrevPage.disabled = lobbyCurrentPage <= 1;
          lobbyNextPage.disabled = lobbyCurrentPage >= totalPages;
        }

        tabButtons.forEach((tab) => {
          tab.addEventListener('click', () => activateTab(tab));
        });

        userSearch.addEventListener('input', () => {
          searchTerm = userSearch.value;
          currentPage = 1;
          renderUsers();
        });

        prevPage.addEventListener('click', () => {
          if (currentPage > 1) {
            currentPage -= 1;
            renderUsers();
          }
        });

        nextPage.addEventListener('click', () => {
          const total = Math.max(1, Math.ceil(filteredUsers().length / pageSize));
          if (currentPage < total) {
            currentPage += 1;
            renderUsers();
          }
        });

        lobbyPrevPage.addEventListener('click', () => {
          if (lobbyCurrentPage > 1) {
            lobbyCurrentPage -= 1;
            renderLobby();
          }
        });

        lobbyNextPage.addEventListener('click', () => {
          const total = Math.max(1, Math.ceil(filteredLobbyUsers().length / lobbyPageSize));
          if (lobbyCurrentPage < total) {
            lobbyCurrentPage += 1;
            renderLobby();
          }
        });

        admitAllLobby.addEventListener('click', () => {
          if (isRestrictedUser) return;

          let changed = false;
          lobbyWaiting.forEach((entry) => {
            changed = admitLobbyEntry(entry) || changed;
          });

          if (changed) {
            renderUsers();
            renderMainVideo();
            renderStrip();
          }

          renderLobby();
        });

        userList.addEventListener('click', (event) => {
          const row = event.target.closest('.user-row');
          if (!row) return;

          const userId = Number(row.dataset.id);
          const user = users.find((entry) => entry.id === userId);
          if (!user) return;

          const button = event.target.closest('button[data-action]');
          if (button) {
            if (isRestrictedUser) return;

            const action = button.dataset.action;
            if (action === 'mute') {
              user.muted = !user.muted;
            } else if (action === 'mod') {
              if (!user.isAdmin) {
                user.mod = !user.mod;
              }
            } else if (action === 'remove') {
              user.removed = true;
              if (pinnedUserId === user.id) {
                pinnedUserId = null;
              }
            }
          } else {
            pinnedUserId = pinnedUserId === user.id ? null : user.id;
          }

          renderUsers();
          renderMainVideo();
          renderStrip();
        });

        lobbyList.addEventListener('click', (event) => {
          if (isRestrictedUser) return;

          const row = event.target.closest('.user-row');
          if (!row) return;

          const entryId = Number(row.dataset.lobbyId);
          const entry = lobbyWaiting.find((item) => item.id === entryId);
          if (!entry) return;

          const button = event.target.closest('button[data-lobby-action]');
          if (!button) return;

          const action = button.dataset.lobbyAction;
          if (action === 'remove') {
            entry.removed = true;
          } else if (action === 'admit') {
            if (admitLobbyEntry(entry)) {
              renderUsers();
              renderMainVideo();
              renderStrip();
            }
          }

          renderLobby();
        });

        showRightSidebar.addEventListener('click', () => {
          setRightSidebarCollapsed(false);
        });

        hideRightSidebar.addEventListener('click', () => {
          setRightSidebarCollapsed(true);
        });

        showLeftSidebar.addEventListener('click', () => {
          setLeftSidebarCollapsed(false);
        });

        hideLeftSidebar.addEventListener('click', () => {
          setLeftSidebarCollapsed(true);
        });

        if (settingsCameraSelect instanceof HTMLSelectElement) {
          settingsCameraSelect.addEventListener('change', () => {
            renderSettingsPanel();
          });
        }

        if (settingsMicSelect instanceof HTMLSelectElement) {
          settingsMicSelect.addEventListener('change', () => {
            renderSettingsPanel();
          });
        }

        backgroundOptions.forEach((button) => {
          button.addEventListener('click', () => {
            backgroundOptions.forEach((entry) => entry.classList.remove('active'));
            button.classList.add('active');
            const blur = Number(button.dataset.bgBlur || '0');
            const scale = Number(button.dataset.bgScale || '1');
            if (mainVideo instanceof HTMLElement) {
              mainVideo.style.setProperty('--video-bg-blur', `${Math.max(0, blur)}px`);
              mainVideo.style.setProperty('--video-bg-scale', String(Math.max(1, scale)));
            }
          });
        });

        controlRaiseHand.addEventListener('click', () => {
          handRaised = !handRaised;
          renderControls();
        });

        controlCamera.addEventListener('click', () => {
          cameraOn = !cameraOn;
          renderControls();
          renderSettingsPanel();
        });

        controlMic.addEventListener('click', () => {
          micOn = !micOn;
          renderControls();
          renderSettingsPanel();
        });

        controlShare.addEventListener('click', () => {
          sharingScreen = !sharingScreen;
          renderControls();
        });

        controlReactions.addEventListener('click', () => {
          setReactionTrayOpen(!reactionTrayOpen);
        });

        reactionEmojiButtons.forEach((button) => {
          button.addEventListener('click', () => {
            const emoji = button.dataset.emoji || '😊';
            const icon = controlReactions.querySelector('.ctrl-icon');
            if (icon) {
              icon.textContent = emoji;
            }
            emitReactionParticle(emoji);
          });
        });

        document.addEventListener('click', (event) => {
          if (!reactionTrayOpen) return;
          if (event.target.closest('#controlReactions') || event.target.closest('#reactionTray')) return;
          setReactionTrayOpen(false);
        });

        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape' && reactionTrayOpen) {
            setReactionTrayOpen(false);
          }
        });

        controlHangup.addEventListener('click', () => {
          handRaised = false;
          cameraOn = false;
          micOn = false;
          sharingScreen = false;
          renderControls();
          renderSettingsPanel();
          setReactionTrayOpen(false);
          window.location.href = './user-calls.html';
        });

        function sendChatMessage() {
          if (!(chatInput instanceof HTMLInputElement)) {
            return;
          }

          const text = chatInput.value.trim();
          if (text === '') {
            return;
          }

          chatMessages.push({ author: session.displayName || 'You', text, self: true });
          chatInput.value = '';
          renderChat();
        }

        if (chatSend) {
          chatSend.addEventListener('click', sendChatMessage);
        }

        if (chatInput) {
          chatInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
              event.preventDefault();
              sendChatMessage();
            }
          });
        }

        window.addEventListener('resize', () => {
          applyStripCapacity();
          const isMobile = window.matchMedia('(max-width: 1180px)').matches;
          if (isMobile !== mobileSidebarState) {
            syncSidebarLayoutForViewport();
          }
        });

        syncSidebarLayoutForViewport(true);
        tabButtons
          .filter((button) => button.classList.contains('active'))
          .forEach((button) => activateTab(button));
        renderUsers();
        renderLobby();
        renderChat();
        renderMainVideo();
        renderStrip();
        renderControls();
        renderSettingsPanel();
        setReactionTrayOpen(false);
      })();
    </script>
  </body>
</html>
